  {
    id: "p6", n: 6, name: "AI / ML Engineering", color: "#7B61FF",
    blurb: "LLMs, embeddings, vector search, RAG, inference, OpenSearch, MLOps, cost & safety.",
    sections: [
      {
        id: "p6-foundations", title: "LLM Foundations",
        concepts: [
          { term: "Tokens & context window", d:1, p:'h',
            full: "A token is the atomic unit LLMs process — roughly 4 chars / 0.75 words in English. Tokenization (BPE/WordPiece) splits text into sub-word units, not characters or words. Context window = maximum tokens the model can attend to at once (input + output). GPT-4: 128K tokens ≈ 96K words. Implications: large documents must be chunked before passing to an LLM. Token count drives cost (LLM APIs price per input/output token) and latency (quadratic attention). Chunk size + overlap strategy is a core RAG design decision.",
            tip: "Cost = input_tokens × price_in + output_tokens × price_out. Output is typically 3-5× more expensive per token. Always estimate token counts before designing a high-volume LLM workflow.",
            simple: "Tokens are word-fragments, not whole words. LLMs have a maximum amount of text they can read at once (context window). Larger context = more expensive. Long documents must be split into chunks first." },
          { term: "Embeddings", d:2, p:'h',
            full: "Dense numeric vectors (e.g. 1536 floats) that represent text semantics — similar meaning → similar vectors → small cosine distance. Generated by an encoder model (text-embedding-ada-002, Amazon Titan Embeddings, Cohere Embed). The foundation of semantic search and RAG. Key properties: dimensionality (higher = more expressive, more memory), model-specific (embeddings from different models are not interoperable). Embedding generation is usually cheap compared to LLM inference.",
            tip: "Embeddings are not transferable across models. If you swap embedding models, you must re-embed all existing documents. Build this re-embedding pipeline before production.",
            simple: "An embedding turns text into a list of numbers where similar meanings are close together. This lets you find 'semantically similar' documents without exact keyword matches." },
          { term: "LLM temperature & sampling", d:2, p:'m',
            full: "Temperature controls output randomness: 0 = deterministic (always picks the most likely token), 1 = balanced, >1 = creative/chaotic. Top-p (nucleus sampling): consider only the smallest set of tokens whose cumulative probability ≥ p. Top-k: consider only the k most likely tokens. For production Q&A/RAG: use temperature 0-0.2 for factual, consistent answers. For creative tasks: 0.7-1.0. High temperature on a factual prompt increases hallucination risk.",
            tip: "For deterministic, auditable systems (compliance, legal): temperature=0 + seed parameter (where supported). For user-facing creative features: temperature=0.7. Never use high temperature for structured JSON output extraction.",
            simple: "Temperature controls how random the AI's word choices are. Temperature 0 = always picks the most likely word (predictable). Higher = more creative but less reliable." },
          { term: "Hallucination & grounding", d:2, p:'h',
            full: "Hallucination: LLMs generate plausible-sounding but factually wrong content because they predict tokens, not look up facts. They have no knowledge of events after their training cutoff. Grounding: providing source documents in the prompt so the model answers from context rather than internal weights — the core principle of RAG. Mitigation stack: RAG (ground in docs) + citation prompting (ask the model to cite sources) + output validation (parse and verify claims) + human review for high-stakes outputs.",
            tip: "In interviews: 'LLMs don't know; they predict. RAG is the production fix.' The three-layer mitigation: retrieval (find relevant docs), attribution (cite them), validation (verify the answer is in the source).",
            simple: "LLMs sometimes make things up confidently because they're predicting words, not looking things up. RAG fixes this by giving the model the relevant documents and telling it to only use those." }
        ]
      },
      {
        id: "p6-retrieval", title: "Embeddings, Vector DBs & OpenSearch",
        concepts: [
          { term: "Vector databases", d:2, p:'h',
            full: "Databases optimized for approximate nearest-neighbor (ANN) search over high-dimensional embedding vectors. Core operation: given a query vector, return the k most similar stored vectors (cosine or dot-product similarity). Indexes: HNSW (Hierarchical Navigable Small World — fast, high recall, high memory) vs IVF (Inverted File Index — lower memory, slightly lower recall). AWS options: OpenSearch with k-NN plugin, Aurora pgvector, Amazon MemoryDB (vector search). External: Pinecone, Weaviate, Qdrant. Trade-off: exact search is too slow at scale — ANN trades a small accuracy loss for orders-of-magnitude speedup.",
            tip: "HNSW vs IVF: HNSW = better recall at higher memory cost (good for <50M vectors). IVF with HNSW graph = better for larger corpora. For AWS: OpenSearch k-NN for integrated search; pgvector for existing PostgreSQL workloads.",
            simple: "A vector database finds 'semantically similar' items by comparing number-arrays (embeddings). It uses approximate search so it's fast at scale, accepting a tiny accuracy trade-off." },
          { term: "OpenSearch: keyword vs semantic vs hybrid", d:2, p:'h',
            full: "OpenSearch supports three search modes on the same index. BM25 (keyword): TF-IDF variant, great for exact terms, fast, no embeddings needed. k-NN (semantic): vector similarity search using embeddings — finds conceptually related docs without exact word match. Hybrid: combine BM25 score + k-NN score with a normalization+weights step (Reciprocal Rank Fusion or linear combo). Hybrid search typically outperforms either alone. OpenSearch also supports sparse vector search (ELSER) for semantic ranking without computing dense embeddings.",
            tip: "For a production enterprise search: start with hybrid BM25 + k-NN. Pure semantic search hurts for rare proper nouns (product codes, IDs). BM25 handles exact matches; k-NN handles intent. Tune the weight ratio on held-out eval queries.",
            simple: "OpenSearch can match by exact keywords (BM25), by meaning (k-NN embeddings), or both combined (hybrid). Hybrid usually wins — keywords catch product codes and exact terms that semantic search misses." },
          { term: "RAG architecture", d:2, p:'h',
            full: "Retrieval-Augmented Generation: instead of relying on the LLM's training knowledge, retrieve relevant documents at query time and inject them into the prompt. Pipeline: query → embed query → ANN search in vector DB → retrieve top-k chunks → insert chunks + query into LLM prompt → LLM generates grounded answer. AWS: Bedrock Knowledge Bases automates this pipeline (S3 → chunking → embedding → OpenSearch/Aurora → retrieval). Variants: self-querying RAG, multi-step RAG, corrective RAG (re-retrieves if answer quality is low).",
            tip: "The two most common RAG failure modes: (1) Retrieval fails — relevant chunk not in top-k. Fix: improve chunking, add metadata filters, use hybrid search. (2) Faithfulness fails — model ignores the retrieved context and hallucinates. Fix: citation prompting, lower temperature, smaller/focused context.",
            simple: "RAG connects an LLM to your own documents. For each question, it finds the relevant chunks, pastes them into the prompt, and the LLM answers only from that content — not from its potentially outdated training." },
          { term: "Chunking strategies", d:2, p:'m',
            full: "How you split documents before embedding affects retrieval quality. Fixed-size: split every N tokens with M token overlap — simple but can cut mid-sentence. Sentence/paragraph: split on semantic boundaries — better coherence, variable size. Semantic: embed each sentence, then merge consecutive sentences with similar meaning — highest quality, slowest. Recursive character (LangChain default): tries splits in order (paragraph → sentence → word) until target size is reached. Chunk size trade-off: small chunks = precise retrieval, may lack context; large chunks = more context, but may include irrelevant content that confuses the LLM. Parent-child: embed small child chunks for retrieval, return parent chunk to LLM for context.",
            tip: "Parent-child chunking is the production sweet spot: small chunks for precise embedding similarity, large parent chunks for coherent context. Bedrock Knowledge Bases supports this with hierarchical chunking.",
            simple: "Chunking = how you slice documents before embedding them. Too small = loses context. Too large = irrelevant noise. Parent-child chunking retrieves small precise chunks but gives the LLM a larger surrounding passage." }
        ]
      },
      {
        id: "p6-inference", title: "Inference & Model Serving",
        concepts: [
          { term: "Inference latency vs throughput", d:2, p:'h',
            full: "LLM inference has two phases: prefill (process all input tokens, parallelizable, fast) and decode (generate output tokens one at a time, sequential — this is the bottleneck). TTFT (Time To First Token): driven by prefill. TBT (Time Between Tokens) / token generation rate: driven by decode. Optimizing for latency: smaller model, less context, streaming output. Optimizing for throughput (batch serving): batching multiple requests together (continuous batching in vLLM/TensorRT-LLM). For interactive UX: stream tokens as generated (Server-Sent Events) so perceived latency is TTFT, not total time.",
            tip: "Streaming is non-optional for interactive apps — users see the first token in ~1s instead of waiting for all 500 tokens. AWS Bedrock, SageMaker endpoints, and Lambda streaming support SSE for this.",
            simple: "LLMs generate text one token at a time (decode phase). For users, stream the tokens as they're generated so they start seeing results immediately instead of waiting for the full response." },
          { term: "GPU instances for ML (P/G/Inf/Trn)", d:2, p:'m',
            full: "AWS GPU/accelerator families: P-instances (P4d/P5 = A100/H100 GPUs, training large models, multi-node NVLink), G-instances (G5/G6 = A10G/L40S, inference + smaller training, more cost-effective), Inf-instances (Inf2 = AWS Inferentia 2 chip, purpose-built inference, best throughput/$), Trn-instances (Trn1/Trn2 = AWS Trainium, training cost-optimization). For inference at scale: Inf2 > G5 on cost/token. For real-time latency-sensitive inference: G5 (easier software stack). For training: P5 (H100) for largest models, Trn1 for cost-optimized.",
            tip: "Interviewers test whether you know Inferentia/Trainium exist. 'For cost-optimized inference at scale on AWS, I'd evaluate Inf2 first.' Shows cloud-native depth beyond generic 'use a GPU instance.'",
            simple: "AWS has different accelerator chips: P/G = NVIDIA GPUs (general purpose), Inf2 = purpose-built for inference (cheaper per token), Trn1 = purpose-built for training (cheaper than GPU for large training runs)." },
          { term: "Quantization & model optimization", d:3, p:'m',
            full: "Reducing model precision to save memory and increase speed. FP32 → FP16/BF16: half the memory, negligible quality loss, standard for inference. INT8: 4× compression vs FP32, slight quality degradation, requires calibration. INT4/GPTQ/AWQ: 8× compression, acceptable for many tasks, state-of-the-art for edge/constrained memory. Pruning: remove weights close to zero. Distillation: train a smaller 'student' model to mimic a larger 'teacher.' These techniques enable running 70B parameter models on consumer GPUs or serving 7B models at 10× the throughput.",
            tip: "When asked 'how do you fit a 70B model on 2 GPUs?': quantization (INT4) + model parallelism (tensor/pipeline). INT4 quantization brings 70B from 140GB (FP16) down to ~35GB.",
            simple: "Quantization shrinks a model by using lower-precision numbers. FP16 = half the original size. INT4 = 8× smaller. Smaller = cheaper to run and faster, with a small quality trade-off." },
          { term: "Fine-tuning vs RAG vs prompt engineering", d:2, p:'h',
            full: "Prompt engineering: craft the input to guide behavior — zero cost, fast, but brittle and limited by context. RAG: retrieve + inject external knowledge at query time — keeps model up-to-date, no retraining, but adds latency and retrieval complexity. Fine-tuning: train the model on domain-specific data — bakes in knowledge and style, but expensive, requires data, and goes stale. When to use each: prompt engineering first (always try this), RAG for proprietary/fresh knowledge, fine-tuning for consistent format/style or specialized domain performance. Most production systems use all three.",
            tip: "Decision tree: Is the issue behavior/format? → prompt or fine-tune. Is the issue missing knowledge? → RAG. Is the issue quality on domain data? → fine-tune on that domain. Order: try prompt engineering first, RAG second, fine-tuning last.",
            simple: "Three ways to customize LLMs: write better prompts (free, fast), give it your documents at query time (RAG), or retrain it on your data (fine-tuning). Most teams use all three in combination." }
        ]
      },
      {
        id: "p6-ops", title: "MLOps, Cost & Safety",
        concepts: [
          { term: "MLOps: versioning, pipelines, drift", d:2, p:'m',
            full: "ML systems differ from software because they depend on data AND code. MLOps practices: model versioning (MLflow, SageMaker Model Registry — track which model version serves what), feature stores (centralized, consistent feature computation for training and serving — prevents train/serve skew), pipelines (SageMaker Pipelines, Kubeflow — automate training → evaluation → registration → deployment). Data/concept drift: the real-world distribution changes, model performance degrades silently. Monitor with SageMaker Model Monitor — track feature distributions and prediction distributions against a baseline.",
            tip: "Train/serve skew is the silent model killer: training uses different feature computation than serving. A feature store with shared feature definitions prevents this. Mention it explicitly.",
            simple: "MLOps treats ML like software: version your models, automate retraining pipelines, and monitor for drift (when the real world stops matching what the model learned)." },
          { term: "LLM cost drivers & optimization", d:2, p:'h',
            full: "Cost = (input_tokens × price_in) + (output_tokens × price_out). Output tokens cost more per token (3-5×). Major levers: model selection (smaller model = cheaper, evaluate first), caching (exact prompt caching for repeated queries — Bedrock supports this), batching (batch API is cheaper for async workloads), streaming (reduces perceived latency, doesn't reduce cost), context compression (summarize history instead of growing it). At scale: evaluate distilled/quantized models before defaulting to the biggest.",
            tip: "For a high-volume LLM system: (1) try a smaller model first, (2) enable prompt caching, (3) use batch API for non-real-time, (4) compress context. These four steps can cut costs 80%+ before architectural changes.",
            simple: "LLM costs come from tokens (input + output). Save money by using smaller models, caching repeated prompts, batching non-urgent requests, and keeping context short." },
          { term: "Safety, guardrails & responsible AI", d:2, p:'h',
            full: "Production LLM systems need guardrails at multiple levels: input filtering (block prompt injection, PII in inputs — AWS Comprehend + Bedrock Guardrails), output filtering (detect harmful content, PII leakage — Bedrock Guardrails, Nemo Guardrails), grounding checks (verify answer is supported by retrieved context — citation validation), access control (who can use which model, which knowledge bases — IAM + Bedrock resource policies). Prompt injection: attacker embeds malicious instructions in user input to hijack model behavior — mitigate with input sanitization and separating system/user prompt roles.",
            tip: "Prompt injection is the XSS of LLM systems. Defense: never trust user-provided content as instructions; clearly separate system prompt (trusted) from user input (untrusted). Bedrock Guardrails handles PII, toxicity, and grounding checks out-of-box.",
            simple: "LLM apps need safety layers: filter bad inputs, filter bad outputs, check that answers are actually grounded in your documents, and control who can access what. AWS Bedrock Guardrails handles most of this." },
          { term: "Bedrock vs SageMaker vs self-hosted", d:2, p:'m',
            full: "Amazon Bedrock: managed API for foundation models (Claude, Titan, Llama, Mistral) — no infrastructure, pay per token, built-in guardrails, Knowledge Bases for RAG. SageMaker: managed ML platform for training, fine-tuning, and hosting your own or open-source models — more control, more ops burden, best for custom fine-tuned models. Self-hosted (EC2/EKS + vLLM/TGI): maximum control, portable to any cloud, highest ops burden, needed for strict data residency or custom model architectures. Decision: Bedrock first for foundation model inference, SageMaker for fine-tuning + custom model serving, self-hosted only if you have a hard requirement.",
            tip: "Frame it like the IaaS/PaaS decision: more abstraction = less ops, less control. 'I'd start with Bedrock for inference. If we need fine-tuning or a model not on Bedrock, SageMaker. Self-hosted only if data can't leave our VPC.'",
            simple: "Bedrock = use AI models via API (easiest, no servers). SageMaker = train and host your own models (more control). Self-hosted = run everything yourself (most control, most work)." }
        ]
      }
    ],
    interview: [
      { d:2, p:'h', q: "Design a RAG system that answers questions from a 100,000-page internal knowledge base. Walk through every component.", a: "Ingestion pipeline: S3 → chunking (parent-child: 256-token child chunks for retrieval, 1024-token parent for context) → embed with Amazon Titan Embeddings → store in OpenSearch k-NN index with metadata (source, date, section). Query path: user query → embed → hybrid search (BM25 + k-NN, Reciprocal Rank Fusion) → retrieve top-5 parent chunks → inject into Claude prompt with citation instructions → stream response. Failure modes: (1) retrieval misses relevant chunk → add metadata filters, tune chunk size, eval with RAGAS; (2) model hallucinates → citation prompting + grounding validation; (3) latency too high → cache common embeddings, pre-warm endpoints. Cost: input tokens dominate — compress context, cache repeated queries." },
      { d:3, p:'h', q: "Your RAG system gives confident but wrong answers. The retrieval looks correct. What's happening and how do you fix it?", a: "The retrieved chunks are in the top-k but the model ignores or misreads them — faithfulness failure, not retrieval failure. Diagnose with RAG evaluation (RAGAS faithfulness score < 0.7 confirms it). Fixes: (1) reduce temperature to 0-0.1 for factual Q&A, (2) citation prompting ('answer ONLY based on the provided context, cite the source'), (3) reduce context size — too many chunks confuse the model, use re-ranking (Cohere Rerank) to trim to 2-3 most relevant, (4) check chunk quality — chunks that start mid-sentence lack context. If still failing: upgrade to a more instruction-following model." },
      { d:2, p:'h', q: "How would you add semantic search to an existing OpenSearch cluster without replacing keyword search?", a: "Hybrid search — add it alongside existing BM25, not instead. Steps: (1) add a dense_vector field to the existing index mapping; (2) batch re-index: for each document, generate embeddings via Bedrock/Cohere API, store in the vector field; (3) at query time, run both a match (BM25) and a knn query, combine scores via Reciprocal Rank Fusion or linear weighted sum; (4) A/B test with real queries against BM25-only baseline. No downtime, no data migration — the vector field is just another field. Tune the weight ratio on a labeled eval set." },
      { d:2, p:'m', q: "LLM inference costs are 10× your budget. What do you do?", a: "Four levers in order: (1) Model selection — benchmark a smaller/cheaper model (Claude Haiku vs Sonnet, Llama 3 8B vs 70B) against quality metrics; acceptable quality at 80% less cost. (2) Prompt caching — cache the static system prompt + common context; Bedrock supports this. (3) Batch API — route non-real-time workloads through batch inference (50%+ cheaper). (4) Context compression — summarize or prune conversation history to reduce input tokens. Then architectural: RAG reduces output length by giving the model the answer to paraphrase rather than generate from scratch." },
      { d:3, p:'m', q: "How do you prevent a user from injecting instructions that hijack your LLM's behavior?", a: "Prompt injection: user embeds 'Ignore all previous instructions and...' in their input. Defense: (1) structural separation — system prompt (trusted) and user input (untrusted) in separate roles; never interpolate user input into the system prompt; (2) input sanitization with Bedrock Guardrails or a classification model that detects injection attempts; (3) output validation — if the model's output doesn't match the expected format or contains unexpected actions, reject it; (4) least-privilege design — the LLM should only have access to tools/APIs it legitimately needs; (5) canary tokens — embed a secret phrase in the system prompt; if it appears in output, injection succeeded." },
      { d:2, p:'h', q: "Walk through the difference between fine-tuning and RAG. When do you choose one vs the other?", a: "RAG: inject knowledge at inference time — good for fresh/proprietary data, no retraining, fast to iterate. Fine-tuning: bake knowledge into weights via continued training — good for consistent format/style, domain-specific patterns the base model doesn't know, reducing prompt length. The failure mode of each: RAG fails when the retrieval misses the relevant chunk. Fine-tuning fails when the data becomes stale or you overfit to training data. Production: use both — RAG for factual grounding, fine-tuning for behavior/style. Try prompt engineering first (zero cost), then RAG, then fine-tuning only when RAG can't solve it." },
      { d:2, p:'m', q: "What is a vector database and when would you use it instead of a relational database?", a: "A vector DB stores embedding vectors and supports ANN (approximate nearest neighbor) similarity search — finds the k most semantically similar items to a query. Use it when your primary query is 'find similar' rather than 'find exact.' Use cases: semantic document search, recommendation by similarity, deduplication, anomaly detection. vs relational: SQL is optimized for exact/range queries (WHERE email = '...'), not cosine distance in 1536 dimensions. At large scale, ANN indexes (HNSW/IVF) are orders of magnitude faster than brute-force cosine over millions of vectors. On AWS: OpenSearch k-NN for integrated text+vector, pgvector if you already use Aurora PostgreSQL." }
    ],
    flashcards: [
      { d:1, p:'h', front: "What is a token in LLM context?", back: "~4 chars / 0.75 words. The atomic unit LLMs process. Cost and context window are measured in tokens." },
      { d:2, p:'h', front: "What is an embedding?", back: "A dense numeric vector representing text semantics. Similar meaning → small cosine distance." },
      { d:2, p:'h', front: "RAG in one sentence?", back: "Retrieve relevant documents at query time, inject into LLM prompt — grounds answers in your data instead of model weights." },
      { d:2, p:'h', front: "Two RAG failure modes?", back: "Retrieval failure (relevant chunk not found) and faithfulness failure (model ignores retrieved context)." },
      { d:2, p:'m', front: "Parent-child chunking?", back: "Small child chunks for precise retrieval; return larger parent chunk to LLM for coherent context." },
      { d:2, p:'h', front: "Hybrid search in OpenSearch?", back: "BM25 (keyword) + k-NN (semantic) scores combined — outperforms either alone." },
      { d:2, p:'h', front: "LLM inference: TTFT vs TBT?", back: "TTFT = Time To First Token (prefill). TBT = Time Between Tokens (decode, the bottleneck)." },
      { d:2, p:'h', front: "Why stream LLM output?", back: "User sees first token in ~1s instead of waiting for all tokens. Perceived latency = TTFT, not total time." },
      { d:2, p:'h', front: "Fine-tuning vs RAG decision?", back: "RAG = fresh/proprietary knowledge. Fine-tuning = style/format/domain behavior. Try prompts first, RAG second, fine-tune last." },
      { d:3, p:'m', front: "INT4 quantization saves how much memory vs FP16?", back: "4× — a 70B model goes from 140GB (FP16) to ~35GB (INT4)." },
      { d:2, p:'h', front: "AWS Bedrock vs SageMaker?", back: "Bedrock = managed foundation model API (per-token). SageMaker = train/host custom/fine-tuned models." },
      { d:2, p:'h', front: "Prompt injection defense?", back: "Separate system prompt (trusted) from user input (untrusted); never interpolate user content into system prompt." },
      { d:2, p:'h', front: "Four LLM cost levers?", back: "Smaller model → prompt caching → batch API → context compression." },
      { d:2, p:'m', front: "HNSW vs IVF index?", back: "HNSW = better recall, higher memory. IVF = lower memory, slightly lower recall. HNSW default for <50M vectors." },
      { d:2, p:'m', front: "Train/serve skew?", back: "Training and serving use different feature computation → silent model degradation. Fix: feature store with shared definitions." },
      { d:2, p:'h', front: "Hallucination mitigation stack?", back: "RAG (grounding) + citation prompting + output validation + temperature=0 for factual queries." }
    ]
  }
];
</script>

<script>
const $ = (h)=>{const d=document.createElement('div');d.innerHTML=h.trim();return d.firstChild;};
const esc = (s)=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

const DLABEL = ['','Foundational','Intermediate','Advanced'];
const DCLASS = ['','d1','d2','d3'];
const PLABEL = {h:'High priority',m:'Medium',l:'Low'};

const state = {
  tab:'pillars',
  pillar:null,
  mode:'full',
  iFilter:'all',
  dFilter:'all',
  // flashcards
  fcFilter:'all', fcLikelihood:'all',
  deck:[], idx:0, flipped:false, wrong:[], done:false,
  // practice
  practiceFilter:'all', practiceLikelihood:'all',
  practiceQueue:[], practiceIdx:0,
  practiceRevealed:false, practiceAnswer:'',
  practiceScore:{nailed:0,got:0,missed:0}, practiceDone:false
};

const TABS=[
  ['pillars','Pillars'],
  ['flashcards','Flashcards'],
  ['interview','Interview Q&A'],
  ['practice','Practice'],
  ['glossary','Glossary']
];

function setAccent(c){document.documentElement.style.setProperty('--accent',c);}

function renderTabs(){
  const t=document.getElementById('tabs'); t.innerHTML='';
  TABS.forEach(([id,label])=>{
    const b=$(`<button class="${state.tab===id?'on':''}">${label}</button>`);
    b.onclick=()=>{
      state.tab=id;
      if(id==='flashcards') startSession(state.fcFilter, state.fcLikelihood);
      if(id==='practice') startPractice();
      render(true);
    };
    t.appendChild(b);
  });
  const ms=$(`<div class="tabs-mode"></div>`);
  [['full','Detailed'],['simple','Plain EN']].forEach(([m,l])=>{
    const b=$(`<button class="${state.mode===m?'on':''}">${l}</button>`);
    b.onclick=()=>{state.mode=m; render();}; ms.appendChild(b);
  });
  t.appendChild(ms);
}

// ---------- PILLARS ----------
function pillarLanding(v){
  setAccent('#D4772C');
  v.appendChild($(`<div class="hint" style="margin-bottom:16px">Pick a pillar. Use <b style="color:#D4772C">Detailed / Plain EN</b> in the top bar to switch mode.</div>`));
  const g=$(`<div class="pgrid"></div>`);
  PILLARS.forEach(p=>{
    const c=$(`<button class="pcard"><div class="pnum" style="color:${p.color}">${p.n}</div>
      <div><div class="pn">${esc(p.name)}</div><div class="pb">${esc(p.blurb)}</div></div></button>`);
    c.onclick=()=>{state.pillar=p.id; render(true);};
    g.appendChild(c);
  });
  v.appendChild(g);
}

function pillarDetail(v,p){
  setAccent(p.color);
  const back=$(`<button class="back-btn">← All pillars</button>`);
  back.onclick=()=>{state.pillar=null; render(true);}; v.appendChild(back);
  v.appendChild($(`<div class="sec" style="margin-bottom:8px"><h3 style="color:${p.color}">${p.n}. ${esc(p.name)}</h3></div>`));

  // difficulty / priority filter bar
  const dbar=$(`<div class="dbar"></div>`);
  [['all','All'],['1','Foundational'],['2','Intermediate'],['3','Advanced'],['ph','High priority'],['pm','Medium']].forEach(([val,label])=>{
    const b=$(`<button class="${state.dFilter===val?'on':''}">${label}</button>`);
    b.onclick=()=>{state.dFilter=val; render(true);}; dbar.appendChild(b);
  });
  v.appendChild(dbar);

  p.sections.forEach(sec=>{
    const filtered = sec.concepts.filter(c=>{
      if(state.dFilter==='all') return true;
      if(state.dFilter==='1') return c.d===1;
      if(state.dFilter==='2') return c.d===2;
      if(state.dFilter==='3') return c.d===3;
      if(state.dFilter==='ph') return c.p==='h';
      if(state.dFilter==='pm') return c.p==='m'||c.p==='h';
      return true;
    });
    if(!filtered.length) return;

    const s=$(`<div class="sec"></div>`);
    s.appendChild($(`<h3>${esc(sec.title)}</h3>`));
    s.appendChild($(`<div class="secline" style="background:${p.color}"></div>`));
    filtered.forEach(c=>{
      const meta=`<div class="card-meta"><span class="dbadge ${DCLASS[c.d]}">${DLABEL[c.d]}</span><span class="pbadge p${c.p}">${PLABEL[c.p]}</span></div>`;
      if(state.mode==='full'){
        const card=$(`<div class="card">${meta}<div class="term">${esc(c.term)}</div>
          <div class="body">${esc(c.full)}</div>
          <div class="tip"><b>Interview tip</b>${esc(c.tip)}</div></div>`);
        s.appendChild(card);
      }else{
        s.appendChild($(`<div class="card simple">${meta}<div class="term">${esc(c.term)}</div>
          <div class="body">${esc(c.simple)}</div></div>`));
      }
    });
    v.appendChild(s);
  });
}

function renderPillars(v){
  if(!state.pillar){pillarLanding(v);return;}
  const p=PILLARS.find(x=>x.id===state.pillar);
  pillarDetail(v,p);
}

// ---------- INTERVIEW ----------
function allInterview(){
  const out=[];
  PILLARS.forEach(p=>p.interview.forEach((qa,i)=>out.push({...qa,pillar:p.name,color:p.color,pid:p.id,key:p.id+'-'+i})));
  return out;
}
function renderInterview(v){
  setAccent('#D4772C');
  const chips=$(`<div class="chips"></div>`);
  const mk=(id,label,col)=>{
    const c=$(`<div class="chip ${state.iFilter===id?'on':''}" style="${state.iFilter===id?`background:${col}22;border-color:${col}66;color:#fff`:''}">${label}</div>`);
    c.onclick=()=>{state.iFilter=id; render();}; return c;
  };
  chips.appendChild(mk('all','All','#D4772C'));
  PILLARS.forEach(p=>chips.appendChild(mk(p.id,p.name.split(' ')[0]==='Software'?'Dev & Cloud':p.name.split('&')[0].trim(),p.color)));
  v.appendChild(chips);

  let list=allInterview();
  if(state.iFilter!=='all') list=list.filter(q=>q.pid===state.iFilter);
  list.forEach(qa=>{
    const card=$(`<div class="q">
      <div class="qq"><span class="qmark">Q</span><span>${esc(qa.q)}</span>
      <span class="pill" style="background:${qa.color}22;color:${qa.color}">${esc(qa.pillar.split('&')[0].trim())}</span></div>
      <div class="aa">
        <div class="card-meta" style="margin-bottom:10px"><span class="dbadge ${DCLASS[qa.d]}">${DLABEL[qa.d]}</span><span class="pbadge p${qa.p}">${PLABEL[qa.p]}</span></div>
        ${esc(qa.a)}</div></div>`);
    card.querySelector('.qq').onclick=()=>card.classList.toggle('open');
    v.appendChild(card);
  });
}

// ---------- FLASHCARDS ----------
function allCards(){
  const out=[];
  PILLARS.forEach(p=>p.flashcards.forEach((c,i)=>out.push({...c,pillar:p.name,color:p.color,pid:p.id,key:p.id+'-'+i})));
  return out;
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function startSession(filter, likelihood){
  let cards=allCards();
  if(filter && filter!=='all') cards=cards.filter(c=>c.pid===filter);
  if(likelihood==='h') cards=cards.filter(c=>c.p==='h');
  if(likelihood==='hm') cards=cards.filter(c=>c.p==='h'||c.p==='m');
  state.deck=shuffle(cards.slice()); state.idx=0; state.flipped=false; state.wrong=[]; state.done=false;
  state.fcFilter=filter||'all'; state.fcLikelihood=likelihood||'all';
}
function answer(got){
  const cur=state.deck[state.idx];
  if(!got) state.wrong.push(cur);
  if(state.idx < state.deck.length-1){state.idx++; state.flipped=false; render();}
  else{
    if(state.wrong.length){state.deck=shuffle(state.wrong); state.idx=0; state.flipped=false; state.wrong=[]; render();}
    else{state.done=true; render();}
  }
}
function renderFlashcards(v){
  setAccent('#D4772C');

  // Pillar chips
  const chips=$(`<div class="chips"></div>`);
  const mk=(id,label,col)=>{
    const c=$(`<div class="chip ${state.fcFilter===id?'on':''}" style="${state.fcFilter===id?`background:${col}22;border-color:${col}66;color:#fff`:''}">${label}</div>`);
    c.onclick=()=>{startSession(id, state.fcLikelihood); render();}; return c;
  };
  chips.appendChild(mk('all','All (random)','#D4772C'));
  PILLARS.forEach(p=>chips.appendChild(mk(p.id,p.name.split('&')[0].trim(),p.color)));
  v.appendChild(chips);

  // Likelihood filter
  const lrow=$(`<div class="modebar" style="margin-bottom:16px"></div>`);
  const lseg=$(`<div class="seg"></div>`);
  [['all','All cards'],['hm','High + Medium'],['h','High priority only']].forEach(([id,label])=>{
    const b=$(`<button class="${state.fcLikelihood===id?'on':''}">${label}</button>`);
    b.onclick=()=>{startSession(state.fcFilter,id); render();}; lseg.appendChild(b);
  });
  lrow.appendChild(lseg);
  v.appendChild(lrow);

  if(state.done){
    const d=$(`<div class="fcdone"><div class="big">Deck cleared.</div>
      <p>Every card answered correctly. Missed cards were recycled until you got them.</p></div>`);
    const r=$(`<button class="restart">Shuffle again</button>`);
    r.onclick=()=>{startSession(state.fcFilter,state.fcLikelihood); render();}; d.appendChild(r); v.appendChild(d); return;
  }
  if(!state.deck.length){v.appendChild($(`<div class="counter">No cards match this filter.</div>`)); return;}

  const cur=state.deck[state.idx];
  setAccent(cur.color);
  const wrap=$(`<div class="fcwrap"></div>`);
  const total=state.deck.length, pct=Math.round((state.idx)/total*100);
  wrap.appendChild($(`<div class="progress"><div style="width:${pct}%"></div></div>`));
  wrap.appendChild($(`<div class="counter">Card ${state.idx+1} / ${total}${state.wrong.length?` · ${state.wrong.length} to recycle`:''}</div>`));

  const flash=$(`<div class="flash ${state.flipped?'flip':''}">
    <div class="inner">
      <div class="face front">
        <span class="pcat" style="background:${cur.color}22;color:${cur.color}">${esc(cur.pillar.split('&')[0].trim())}</span>
        <div class="lab">Prompt — tap to flip</div><div class="txt">${esc(cur.front)}</div>
        <div style="position:absolute;bottom:14px;left:16px;display:flex;gap:5px">
          <span class="dbadge ${DCLASS[cur.d]}">${DLABEL[cur.d]}</span>
          <span class="pbadge p${cur.p}">${PLABEL[cur.p]}</span>
        </div>
      </div>
      <div class="face back">
        <span class="pcat" style="background:${cur.color}22;color:${cur.color}">${esc(cur.pillar.split('&')[0].trim())}</span>
        <div class="lab">Answer</div><div class="txt">${esc(cur.back)}</div>
      </div>
    </div></div>`);
  flash.querySelector('.inner').onclick=()=>{state.flipped=!state.flipped; render();};
  wrap.appendChild(flash);

  const btns=$(`<div class="fcbtns"></div>`);
  const miss=$(`<button class="miss">✗ Missed</button>`);
  const got=$(`<button class="got">✓ Got it</button>`);
  miss.onclick=()=>answer(false); got.onclick=()=>answer(true);
  btns.appendChild(miss); btns.appendChild(got); wrap.appendChild(btns);
  wrap.appendChild($(`<div class="hint" style="text-align:center">Missed cards reshuffle in until cleared.</div>`));
  v.appendChild(wrap);
}

// ---------- PRACTICE ----------
function buildPracticeQueue(){
  let items=[];
  PILLARS.forEach(p=>p.interview.forEach((qa,i)=>{
    if(state.practiceFilter!=='all' && p.id!==state.practiceFilter) return;
    if(state.practiceLikelihood==='h' && qa.p!=='h') return;
    if(state.practiceLikelihood==='hm' && qa.p==='l') return;
    items.push({...qa, pillar:p.name, color:p.color, pid:p.id, key:p.id+'-'+i});
  }));
  return shuffle(items);
}
function startPractice(){
  state.practiceQueue=buildPracticeQueue();
  state.practiceIdx=0; state.practiceRevealed=false;
  state.practiceAnswer=''; state.practiceScore={nailed:0,got:0,missed:0}; state.practiceDone=false;
}
function ratePractice(rating){
  state.practiceScore[rating]++;
  if(state.practiceIdx < state.practiceQueue.length-1){
    state.practiceIdx++; state.practiceRevealed=false; state.practiceAnswer=''; render();
  } else {
    state.practiceDone=true; render();
  }
}
function renderPractice(v){
  setAccent('#D4772C');

  // Likelihood filter
  const lrow=$(`<div class="modebar"></div>`);
  const lseg=$(`<div class="seg"></div>`);
  [['all','All scenarios'],['hm','High + Medium'],['h','High priority only']].forEach(([id,label])=>{
    const b=$(`<button class="${state.practiceLikelihood===id?'on':''}">${label}</button>`);
    b.onclick=()=>{state.practiceLikelihood=id; startPractice(); render();}; lseg.appendChild(b);
  });
  lrow.appendChild(lseg);
  v.appendChild(lrow);

  // Pillar chips
  const chips=$(`<div class="chips"></div>`);
  const mk=(id,label,col)=>{
    const c=$(`<div class="chip ${state.practiceFilter===id?'on':''}" style="${state.practiceFilter===id?`background:${col}22;border-color:${col}66;color:#fff`:''}">${label}</div>`);
    c.onclick=()=>{state.practiceFilter=id; startPractice(); render();}; return c;
  };
  chips.appendChild(mk('all','All pillars','#D4772C'));
  PILLARS.forEach(p=>chips.appendChild(mk(p.id,p.name.split('&')[0].trim().split(' ').slice(0,2).join(' '),p.color)));
  v.appendChild(chips);

  if(!state.practiceQueue.length) startPractice();

  if(state.practiceDone || !state.practiceQueue.length){
    const {nailed,got,missed}=state.practiceScore;
    const total=nailed+got+missed;
    const d=$(`<div class="fcdone">
      <div class="big">Session done.</div>
      <p style="margin-bottom:16px">${total} scenario${total!==1?'s':''} practised</p>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:24px">
        <span class="dbadge d1">✓ ${nailed} nailed</span>
        <span class="dbadge d2">~ ${got} got it</span>
        <span class="dbadge d3">✗ ${missed} missed</span>
      </div></div>`);
    const r=$(`<button class="restart">New session</button>`);
    r.onclick=()=>{startPractice(); render();}; d.appendChild(r); v.appendChild(d); return;
  }

  const cur=state.practiceQueue[state.practiceIdx];
  setAccent(cur.color);
  const total=state.practiceQueue.length;
  const pct=Math.round(state.practiceIdx/total*100);
  v.appendChild($(`<div class="progress" style="margin-bottom:10px"><div style="width:${pct}%"></div></div>`));

  const {nailed,got,missed}=state.practiceScore;
  const scored=nailed+got+missed;
  const toprow=$(`<div class="ptop-row"></div>`);
  toprow.appendChild($(`<div class="counter">Scenario ${state.practiceIdx+1} / ${total}</div>`));
  if(scored>0){
    toprow.appendChild($(`<div class="score-chips">
      <span class="sc-n">✓${nailed}</span>
      <span class="sc-g">~${got}</span>
      <span class="sc-m">✗${missed}</span>
    </div>`));
  }
  v.appendChild(toprow);

  const qcard=$(`<div class="pq-wrap"></div>`);
  const meta=$(`<div class="card-meta" style="margin-bottom:12px">
    <span class="pill" style="background:${cur.color}22;color:${cur.color}">${esc(cur.pillar.split('&')[0].trim())}</span>
    <span class="dbadge ${DCLASS[cur.d]}">${DLABEL[cur.d]}</span>
    <span class="pbadge p${cur.p}">${PLABEL[cur.p]}</span>
  </div>`);
  qcard.appendChild(meta);
  qcard.appendChild($(`<div class="pq-text">${esc(cur.q)}</div>`));

  const ta=document.createElement('textarea');
  ta.className='pq-ta';
  ta.placeholder='Write your answer here first — this is what makes the practice work.';
  ta.value=state.practiceAnswer;
  ta.oninput=(e)=>{state.practiceAnswer=e.target.value;};
  qcard.appendChild(ta);

  if(!state.practiceRevealed){
    const btn=$(`<button class="reveal-btn">Reveal model answer</button>`);
    btn.onclick=()=>{state.practiceRevealed=true; render();};
    qcard.appendChild(btn);
  } else {
    qcard.appendChild($(`<div class="model-ans"><span class="model-ans-label">Model answer</span>${esc(cur.a)}</div>`));
    const row=$(`<div class="rate-row"></div>`);
    const rn=$(`<button class="rbtn-nail">✓ Nailed it</button>`);
    const rg=$(`<button class="rbtn-got">~ Got the idea</button>`);
    const rm=$(`<button class="rbtn-miss">✗ Missed it</button>`);
    rn.onclick=()=>ratePractice('nailed');
    rg.onclick=()=>ratePractice('got');
    rm.onclick=()=>ratePractice('missed');
    row.appendChild(rn); row.appendChild(rg); row.appendChild(rm);
    qcard.appendChild(row);
  }
  v.appendChild(qcard);
  v.appendChild($(`<div class="hint" style="text-align:center;margin-top:4px">Write your answer before revealing — that gap is where the learning happens.</div>`));
}

// ---------- GLOSSARY ----------
function renderGlossary(v){
  setAccent('#D4772C');
  v.appendChild($(`<div class="hint" style="margin-bottom:6px">Every key term across all five pillars, grouped by pillar.</div>`));
  PILLARS.forEach(p=>{
    v.appendChild($(`<div class="gcat" style="color:${p.color}">${p.n}. ${esc(p.name)}</div>`));
    p.sections.forEach(sec=>sec.concepts.forEach(c=>{
      v.appendChild($(`<div class="grow"><div class="gt" style="color:${p.color}">${esc(c.term)}</div><div class="gd">${esc(c.simple)}</div></div>`));
    }));
  });
}

// ---------- ROUTER ----------
function render(resetScroll){
  renderTabs();
  const v=document.getElementById('view'); v.innerHTML='';
  if(state.tab==='pillars') renderPillars(v);
  else if(state.tab==='flashcards') renderFlashcards(v);
  else if(state.tab==='interview') renderInterview(v);
  else if(state.tab==='practice') renderPractice(v);
  else if(state.tab==='glossary') renderGlossary(v);
  if(resetScroll) window.scrollTo({top:0,behavior:'instant'});
}
startSession('all','all');
render(true);
</script>
</body>
