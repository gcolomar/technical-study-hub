          { term: "Statelessness & Twelve-Factor", d:2, p:'h',
            full: "Stateless services keep no client session in memory — any instance can serve any request, enabling horizontal scaling and easy replacement. Twelve-Factor codifies this (config in env, stateless processes, disposability, dev/prod parity).",
            tip: "Statelessness is the factor that most directly enables autoscaling. Push session state to a shared store (Redis/DynamoDB).",
            simple: "If a server remembers nothing about you between requests, you can add or kill servers freely. Keep the 'memory' in a shared database instead." },
          { term: "REST vs gRPC vs GraphQL", d:2, p:'h',
            full: "REST: resource-oriented HTTP, ubiquitous, cacheable. gRPC: binary HTTP/2 + protobuf, low-latency service-to-service, streaming — not browser-native. GraphQL: client specifies exactly the fields it wants, solving over/under-fetching, at the cost of caching and query-complexity control.",
            tip: "gRPC for internal service-to-service; REST for public/cacheable APIs; GraphQL when diverse clients need flexible field selection.",
            simple: "REST = standard web requests. gRPC = fast machine-to-machine. GraphQL = ask for exactly the fields you want in one call." },
          { term: "Retry with exponential backoff & jitter", d:2, p:'h',
            full: "Naive immediate retries amplify load on a failing service. Exponential backoff doubles the wait after each failure (1s, 2s, 4s, 8s…) to reduce pressure. Jitter adds randomness to the delay so a fleet of clients doesn't all retry at the same instant (synchronized retries recreate the thundering herd). AWS SDKs implement this by default, but you must tune max retries and the max backoff cap.",
            tip: "Jitter is non-obvious — stress it. 'Exponential backoff alone doesn't prevent synchronized retries across a fleet. Adding jitter spreads the load.' This shows you think about fleet-level behavior.",
            simple: "When a service fails, wait before retrying, double the wait each time, and add random variation so thousands of clients don't all retry at the exact same instant." },
          { term: "Cascading failure prevention", d:2, p:'h',
            full: "When Service A's dependency (B) slows, A's threads block waiting, A's queue fills, A slows for its callers, and the whole system degrades. Defense: timeouts (bound how long A will wait), circuit breakers (stop calling B when it's down — fail fast), bulkheads (separate thread pools so B's failure can't exhaust A's shared resources). All three are needed together.",
            tip: "The complete answer is Timeout + Circuit Breaker + Bulkhead. Each one catches a different failure mode. A circuit breaker without a timeout still blocks; a timeout without a circuit breaker causes repeated slow calls.",
            simple: "When one slow service makes all its callers queue up and slow down too, everything cascades. Timeouts, circuit breakers, and bulkheads each catch a different stage of that failure." }
        ]
      },
      {
        id: "p3-cloud", title: "Cloud Computing & Compute Models",
        concepts: [
          { term: "IaaS vs PaaS vs SaaS", d:1, p:'h',
            full: "IaaS (EC2, VMs): you manage OS, runtime, app — maximum control, maximum responsibility. PaaS (Elastic Beanstalk, Lambda, Heroku): provider manages OS/runtime, you manage app and data — faster to ship, less control over infra. SaaS (Gmail, Salesforce): provider manages everything including the app — you configure, not build. The tradeoff is always control vs ops burden.",
            tip: "Frame it with examples per tier: 'I'd pick Lambda (PaaS) for event-driven processing; EC2 (IaaS) when I need a custom kernel or GPU drivers.'",
            simple: "IaaS = rent a computer (you install everything). PaaS = rent a platform (you write the app). SaaS = rent the whole product (you just use it). More managed = less control." },
          { term: "Regions, AZs & Edge", d:1, p:'h',
            full: "A Region is a geographic area with multiple isolated Availability Zones (AZs). AZs are separate data centers within a region — independent power, networking, cooling. Deploying across AZs gives resilience to datacenter failure. Edge Locations (CloudFront, Global Accelerator) cache content or terminate TCP near users to reduce latency. A global application typically means multi-region active-active or active-passive.",
            tip: "Minimum HA in AWS = 3 AZs. For true disaster recovery, add multi-region. CloudFront/Global Accelerator for latency reduction; Route 53 for global DNS-based failover.",
            simple: "Regions = geographic locations (e.g. us-east-1). Inside each are separate data centers (AZs). Spread across AZs for resilience. Spread across Regions for disaster recovery." },
          { term: "Shared Responsibility Model", d:1, p:'h',
            full: "AWS secures the cloud (data centers, hypervisor, hardware, network fabric). You secure what's in the cloud (your code, IAM, encryption, network rules). The boundary moves by service: EC2 = you patch the OS; Lambda = they do, you own code+IAM; RDS = they patch the engine, you manage access+encryption.",
            tip: "The winning line: 'My first security question is — where does the shared responsibility boundary fall for THIS service?'",
            simple: "AWS protects the building; you protect what you put inside. How much you protect depends on the service — more managed = less on you." },
          { term: "ECS vs Fargate", d:2, p:'h',
            full: "ECS is the orchestrator (schedules containers). The launch type decides who runs the hosts: EC2 launch type = you manage the instances; Fargate = serverless, AWS runs the hosts and you just specify CPU/memory per task.",
            tip: "Fargate removes node management but costs more per unit; EC2 launch type is cheaper at scale if you'll manage capacity.",
            simple: "ECS decides where containers run. Fargate means you don't manage the servers underneath; with the EC2 type you do." }

      {
        id: "p3-data", title: "Data & Consistency",
        concepts: [
          { term: "SQL vs NoSQL trade-offs", d:2, p:'h',
            full: "SQL (relational): ACID, joins, schema-on-write, powerful querying — great for transactional data with complex relationships. NoSQL: flexible schema, horizontal scaling, purpose-built access patterns. Subtypes: Key-Value (DynamoDB, Redis — O(1) lookups, no joins), Document (MongoDB — nested queries), Wide-column (Cassandra — write-heavy, time-series), Graph (Neptune — relationship traversal). The real question: 'What are your access patterns?' — pick the store that makes those patterns efficient.",
            tip: "Never say 'NoSQL for scale.' Say: 'I'd choose DynamoDB for this pattern because the access is always by single partition key, and joins are unnecessary here.'",
            simple: "SQL = tables with relationships, great for complex queries. NoSQL = purpose-built for specific access patterns and horizontal scaling. Pick based on how you'll actually read the data, not buzzwords." },
          { term: "ACID vs BASE", d:2, p:'h',
            full: "ACID (Atomicity, Consistency, Isolation, Durability): traditional transaction model — all or nothing, always valid, isolated from concurrent transactions, durable on commit. Used by RDS, Aurora. BASE (Basically Available, Soft state, Eventually consistent): NoSQL approach — accept temporary inconsistency for higher availability and throughput. The application must handle reading stale data. DynamoDB can be tuned: eventually consistent reads (default, cheaper) vs strongly consistent reads (more expensive).",
            tip: "ACID vs BASE is not all-or-nothing. DynamoDB lets you choose per-request. For financial transactions, ACID. For shopping carts, BASE is fine — stale inventory for a few seconds is acceptable.",
            simple: "ACID = database ensures everything stays correct and never loses data. BASE = system is mostly available and 'maybe slightly out of date' — trades correctness for speed and scale." },
          { term: "Caching strategies (multi-layer)", d:2, p:'h',
            full: "Layers from fast to slow: CPU L1/L2/L3 cache (nanoseconds), application memory (local process cache, microseconds), distributed cache (Redis/Memcached, sub-millisecond), CDN edge cache (tens of ms), database. Cache-aside: app checks cache, loads from DB on miss, writes to cache. Write-through: writes go to both cache and DB synchronously. TTL + jitter prevents stampedes. Cache invalidation by event is precise but complex.",
            tip: "Name all layers when designing. 'We cache at the CDN for static content, Redis for session and hot DB queries, and in-process LRU for config/feature flags.' Shows depth beyond just 'add Redis.'",
            simple: "Caching happens at multiple levels — in the browser, CDN, app server memory, and Redis. Each layer trades freshness for speed. The hard part is knowing when to evict." },
          { term: "CAP theorem", d:2, p:'h',
            full: "Under a network partition you must choose Consistency (reject/wait) or Availability (serve possibly-stale data) — you can't have both during the partition. Network partitions are not optional in distributed systems, so the real choice is CP vs AP. When there's no partition you can have both.",
            tip: "Real systems are tunable. The better lens is PACELC: during a Partition choose A/C; Else (normal operation) choose Latency vs Consistency.",
            simple: "When the network splits, a database must pick: stay correct or stay up. It can't do both at that moment." },
          { term: "Thundering herd / cache stampede", d:2, p:'m',
            full: "When a popular cached key expires, many requests miss simultaneously and all hit the database at once. Mitigations: request coalescing (single-flight), staggered/jittered TTLs, probabilistic early expiration, or serving stale-while-revalidate.",
            tip: "Name it precisely — 'thundering herd' / 'cache stampede.' Best fix combo: single-flight + jittered TTL.",
            simple: "When a popular cached item expires, everyone asks the database at the exact same instant and overwhelms it. You stagger expirations and let one request refill." },
          { term: "2PC vs SAGA", d:3, p:'m',
            full: "Two-Phase Commit: a coordinator locks all participants then commits — strong consistency but blocking and fragile to coordinator failure. SAGA: a sequence of local transactions with compensating actions to undo on failure — no global lock, eventual consistency, far more scalable across services.",
            tip: "Across microservices, prefer SAGA with compensating transactions. 2PC doesn't scale and couples services.",
            simple: "2PC = everyone agrees together before committing (safe but slow and brittle). SAGA = do steps one by one, and if one fails, run 'undo' steps." }
        ]

      {
        id: "p3-cicd", title: "CI/CD & Deployment",
        concepts: [
          { term: "CI vs CD distinction", d:1, p:'h',
            full: "Continuous Integration: every commit triggers automated build + test — fast feedback, prevents integration hell. Continuous Delivery: every passing build is deployable to production (but may require a manual approval gate). Continuous Deployment: every passing build is automatically deployed without manual approval. CD without CI is risky — you need fast automated tests to safely automate deployments.",
            tip: "Many orgs conflate CD (Delivery) and CD (Deployment). In an interview, clarify: 'Do we automatically deploy, or is there a manual gate?' The answer determines how fast you iterate and how much risk you carry.",
            simple: "CI = automatically test every commit. Continuous Delivery = always ready to deploy (but someone presses the button). Continuous Deployment = automatically deploys every passing commit." },
          { term: "Gated stages & Testing Pyramid", d:2, p:'m',
            full: "The Testing Pyramid: many unit tests (fast, cheap), fewer integration tests (test contracts between services), fewer E2E tests (slow, flaky but validate the full flow). Each CI stage gates progress: unit → integration → staging → production. The gate is automated metrics (error rate, latency, CPU) combined with a manual approval option. Pair with canary or blue/green for staged production rollout.",
            tip: "Invert pyramid (too many E2E) = slow, flaky pipeline that developers ignore. The goal: fast feedback (unit) catching 80% of bugs before the slow integration stage.",
            simple: "Test in stages: lots of fast unit tests, fewer integration tests, fewer slow full-system tests. Each stage checks before passing to the next — failures stop early before reaching production." },
          { term: "Blue/Green vs Canary vs Rolling", d:2, p:'h',
            full: "Blue/Green: two full environments, switch traffic at once — instant rollback, double infra. Canary: shift a small % first, watch metrics, then ramp — limits blast radius. Rolling: replace instances batch by batch — no extra infra, slower rollback.",
            tip: "Canary is the safest for risky changes (small blast radius + automated metric gates); Blue/Green for fastest rollback.",
            simple: "Blue/Green = flip everyone at once with a spare copy ready. Canary = test on a few users first. Rolling = swap servers a few at a time." },
          { term: "Expand and Contract", d:2, p:'h',
            full: "A pattern for zero-downtime schema/contract changes: Expand (add the new column/field, write to both), migrate, then Contract (remove the old). Lets old and new code coexist during deploy.",
            tip: "This is the answer to 'how do you change a database schema without downtime?' Name the pattern explicitly.",
            simple: "Add the new thing alongside the old, move everything over, then remove the old — so nothing breaks mid-change." }
        ]

      {

            simple: "SLI = what you measure, SLO = your goal, SLA = the promise to customers. P99 = the slowest 1% of requests — the ones users complain about." }

    interview: [
      { d:2, p:'h', q: "Your bookstore startup grows from 50 to 50 million users. Walk me through how the architecture evolves.", a: "Start monolith + single DB (simplicity wins early). Add a CDN and stateless app tier behind a load balancer so you can scale horizontally — push session state to Redis/DynamoDB. Add read replicas, then caching for hot reads (watch for cache stampede — single-flight + jittered TTL). Shard or move hot domains to purpose-fit stores (polyglot persistence). Extract microservices only where team/scaling pain justifies it, using SAGA for cross-service transactions. Throughout: reason about the bottleneck before adding components." },
      { d:2, p:'h', q: "How do you change a production database schema with zero downtime?", a: "Expand and Contract. Expand: add the new column/field and have the app write to both old and new. Backfill/migrate existing data. Switch reads to the new field. Contract: once nothing reads the old field, remove it. Old and new code coexist safely throughout. Pair with feature flags to decouple deploy from release." },
      { d:2, p:'h', q: "A request is slow but you don't know which service is responsible. What do you do?", a: "Reach for distributed traces to find which span dominates latency — reason in p99, not averages. Once the culprit service is identified, drill into its metrics and logs for that time window. Diagnose → fix → acknowledge trade-off → backstop: e.g. if it's a cache stampede, add single-flight + jittered TTL, accept slightly staler data, and set an alert on origin QPS as a backstop." },
      { d:2, p:'h', q: "A downstream service is slow and degrading your entire application. Walk through how you protect against it.", a: "Three layers: Timeouts (bound how long you'll wait — prevents slow calls from blocking threads), Circuit Breaker (after N failures, stop calling for a window — fail fast, return a fallback), Bulkhead (dedicate a separate thread pool per downstream so one slow dependency can't exhaust all threads). Without all three: timeout alone = repeated slow calls; circuit breaker without timeout = still blocks; no bulkhead = one bad dependency starves everything else." },
      { d:1, p:'h', q: "When would you choose NoSQL over relational?", a: "When access patterns are known and simple (always fetching by the same key), when horizontal scaling beyond what one relational instance can handle is required, or when the data model is genuinely document-shaped with variable schema. Not just 'for scale' — Aurora can scale surprisingly far. Ask: 'What are the specific access patterns?' If they require joins across many tables or ad-hoc querying, relational usually wins." },
      { d:2, p:'m', q: "Your CI pipeline takes 45 minutes. Developers are skipping it. How do you fix it?", a: "Diagnose the bottleneck: is it unit tests (too many or too slow?), integration tests (real services vs mocks?), or build times? Fix the pyramid inversion: most coverage should be fast unit tests, not slow E2E. Run stages in parallel where possible. Cache dependencies and test results. Gate production on a fast (~5 min) subset; run full regression asynchronously. Fast feedback = developers trust and use the pipeline." }
