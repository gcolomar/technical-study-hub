  {
    id: "p4", n: 4, name: "Data & Analytics", color: "#E6A817",
    blurb: "Distributed theory, storage engines, modeling, streaming, Kafka, warehouse/lake, caching.",
    sections: [
      {
        id: "p4-theory", title: "Distributed Systems Theory",
        concepts: [
          { term: "PACELC theorem", d:3, p:'m',
            full: "Extends CAP: if there's a Partition, trade Availability vs Consistency; Else (normal operation), trade Latency vs Consistency. It captures that even with no failures you're constantly trading latency for consistency.",
            tip: "PACELC is the more honest model — DynamoDB is PA/EL (favors availability and low latency); a strongly-consistent store is PC/EC.",
            simple: "Even when nothing is broken, a distributed database still trades speed for correctness. PACELC just names both situations." },
          { term: "Consistency models spectrum", d:3, p:'m',
            full: "From strongest to weakest: Linearizability (reads see the most recent write globally — Aurora DSQL), Sequential consistency (operations appear in a global order, not necessarily real-time), Causal consistency (causally-related operations are seen in order), Eventual consistency (all replicas converge eventually — DynamoDB default). Stronger = higher latency and lower availability; weaker = faster but reads may be stale.",
            tip: "Named levels matter in interviews: 'DynamoDB defaults to eventual consistency. Use strongly consistent reads (double the cost) only where you can't tolerate stale data — like post-write immediate reads.'",
            simple: "Consistency is a spectrum: strong = every read sees the latest write (slow). Eventual = 'will sync up eventually' (fast). Choose based on whether your business can tolerate briefly stale data." },
          { term: "Vector clocks", d:3, p:'l',
            full: "A logical clock mechanism for tracking causality across distributed nodes without a global synchronized clock. Each node has a counter; each message carries the full vector. Receiving a message merges vectors. Allows detecting concurrent vs causally-ordered updates — if neither vector dominates, the updates are concurrent (conflict). Used in Dynamo-style systems for conflict detection.",
            tip: "When is a conflict a conflict? Only when two updates are concurrent (neither happens-before the other). Vector clocks detect this without wall-clock time, which can't be trusted across nodes.",
            simple: "Vector clocks let distributed systems figure out which events caused which, without a shared clock. If neither node's events caused the other's, they're concurrent and may conflict." },
          { term: "RUM conjecture", d:3, p:'l',
            full: "You can optimize at most two of Read overhead, Update overhead, and Memory overhead — improving one hurts another. It explains why no single storage structure is best at everything.",
            tip: "Use RUM to justify storage choices: LSM-trees optimize writes (low update overhead) at the cost of read amplification.",
            simple: "A storage design can be great at reads, writes, or space — pick two. You can't win all three." },
          { term: "2PC vs Sagas (data view)", d:3, p:'m',
            full: "Same trade-off as Pillar 3 but framed for pipelines: 2PC gives atomic cross-store commits but blocks and doesn't scale; Sagas give scalable eventual consistency via compensations. Vector clocks help resolve concurrent updates without a global clock.",
            tip: "Mention vector clocks for conflict detection in multi-master/eventually-consistent stores (e.g. Dynamo-style).",
            simple: "Coordinating a change across many databases is either strict-but-slow (2PC) or flexible-but-eventually-consistent (Sagas)." }
        ]
      },
      {
        id: "p4-storage", title: "Storage Engines",
        concepts: [
          { term: "Relational vs Document vs KV vs Graph", d:2, p:'h',
            full: "Relational (Aurora/RDS): ACID, joins, flexible queries — financial transactions, user accounts. Document (MongoDB, DynamoDB): nested JSON, flexible schema — product catalogs, user profiles. Key-Value (Redis, DynamoDB): O(1) lookup by key — sessions, caches, leaderboards. Graph (Neptune): relationship traversal — social networks, fraud detection, recommendation engines. Wide-column (Cassandra): time-series, high-write ingest. Choose the store that makes your primary access pattern O(1) or near it.",
            tip: "The question to ask first: 'What are the access patterns?' If it's primarily 'fetch entity by ID + traverse relationships,' graph. 'Time-ordered events,' wide-column. 'Complex reporting,' relational.",
            simple: "Pick the database type that matches how you'll actually read the data: key-value for fast lookups, relational for complex queries, graph for following connections, document for flexible records." },
          { term: "OLTP vs OLAP", d:2, p:'h',
            full: "OLTP (Online Transaction Processing): short, high-frequency reads/writes on individual records — apps, e-commerce. Optimized with row-oriented storage and indexes on primary keys. OLAP (Online Analytical Processing): complex queries over millions of rows, few columns, aggregations — BI, reporting. Optimized with columnar storage, compression, and distributed execution. These have opposite storage trade-offs — don't mix them; use a warehouse (Redshift) or Athena for analytics, not your Aurora cluster.",
            tip: "Running analytics on your OLTP database kills production performance. CDC or read replicas feed the warehouse. This separation is a key pattern at every L5 data architecture.",
            simple: "OLTP = your live app database (fast short reads/writes). OLAP = analytics on huge datasets (slow big scans). They have opposite needs — don't run analytics on your production database." },
          { term: "B-Tree vs LSM-Tree", d:3, p:'m',
            full: "B-Trees: update in place, great read latency, used by most relational DBs. LSM-Trees: buffer writes in memory then flush sorted segments, compacting later — excellent write throughput, but read amplification and background compaction cost. Used by Cassandra, RocksDB, DynamoDB.",
            tip: "Write-heavy ingest → LSM. Read-heavy with point lookups → B-Tree. Tie back to RUM.",
            simple: "B-Trees keep data tidy for fast reads. LSM-Trees dump writes fast and tidy up later — great for heavy writing." },
          { term: "Star schema & slowly changing dimensions", d:3, p:'m',
            full: "Star schema: central fact table (events/orders) surrounded by dimension tables (customer, product, time) — optimized for analytical queries. Slowly Changing Dimensions (SCD): how to handle when a dimension value changes (e.g. customer moves). SCD Type 1: overwrite old value (lose history). Type 2: add a new row with effective dates (keep full history). Type 3: add a 'previous value' column. Type 2 is standard for analytics.",
            tip: "SCD Type 2 is the go-to for maintaining history. It enables 'what was this customer's state at time of purchase?' queries — important for compliance and cohort analysis.",
            simple: "Star schema = one big table of events linked to reference tables (customers, products). When a reference value changes, SCD Type 2 adds a new row with dates instead of overwriting the old one." },
          { term: "Indexing strategies", d:3, p:'m',
            full: "B-Tree index: standard for equality and range queries (most RDBMS defaults). Bitmap index: for low-cardinality columns (gender, status) — compresses well for OLAP. Covering index: includes all columns needed by a query so the DB never touches the main table (index-only scan). Partial index: indexes only a subset of rows (e.g. WHERE status = 'active') — smaller and faster. Over-indexing kills write performance (each insert/update must update all indexes).",
            tip: "Covering index is the single biggest query performance optimization most teams miss. 'Why is this query still slow after adding an index?' — check if it's a covering index. See with EXPLAIN ANALYZE.",
            simple: "Indexes speed up reads but slow down writes (every write updates all indexes). A covering index puts all columns a query needs into the index itself — the fastest type." },
          { term: "Columnar vs Row storage", d:2, p:'h',
            full: "Row storage keeps a record's fields together — good for OLTP (read/write whole rows). Columnar stores each column together — great compression and fast analytical scans over few columns (OLAP). Redshift, Parquet are columnar.",
            tip: "Analytics over a few columns across billions of rows → columnar. Transactional whole-row access → row. Redshift is columnar even though it speaks SQL.",
            simple: "Row = store each record together (good for apps). Column = store each field together (good for analytics that scan one column)." },
          { term: "Partition key vs Sort key (DynamoDB)", d:2, p:'h',
            full: "Partition key determines which physical partition (and must spread load evenly). Sort key orders items within a partition and enables range queries. Together they form the primary key. A hot partition key concentrates traffic and throttles.",
            tip: "Choose a high-cardinality, evenly-accessed partition key to avoid hot partitions; use write sharding (suffix) if one key is unavoidably hot.",
            simple: "Partition key picks which bucket your data lives in; sort key orders items inside that bucket. Pick a partition key that spreads load evenly." }
        ]
      },
      {
        id: "p4-scaling", title: "Scaling & Distribution",
        concepts: [
          { term: "Consistent hashing & virtual nodes", d:3, p:'m',
            full: "Maps keys and nodes onto a ring so adding/removing a node only remaps a small fraction of keys (not everything). Virtual nodes give each physical node many ring positions for even distribution and smoother rebalancing.",
            tip: "Distinguish from plain modulo sharding, where adding a node reshuffles almost all keys. Virtual nodes fix load skew.",
            simple: "Put data and servers on a circle so adding a server only moves a few items, not all of them. Virtual nodes keep the load even." },
          { term: "Shard key selection", d:3, p:'m',
            full: "The shard key determines data distribution. Bad keys: timestamp (all writes go to the latest shard — temporal hotspot), low-cardinality column (few distinct values → few shards), sequential IDs (monotonically increasing → latest shard always hot). Good keys: high-cardinality, evenly distributed, matches query patterns. Strategy: hash the key for even distribution; range shard for range queries (at the cost of hotspots at the edges).",
            tip: "Timestamp as shard key is the most common mistake. 'All writes today go to the same shard' is a fatal hotspot. Use a hash or a compound key with a random prefix.",
            simple: "Pick a shard key that distributes data evenly across shards. Using timestamps or sequential IDs concentrates all new writes on one shard — the most common sharding mistake." },
          { term: "Temporal hotspots", d:3, p:'h',
            full: "When recent data gets disproportionately more reads and writes (news feed, IoT, trading, leaderboards), a time-based partition key creates a hotspot: the current time-period partition absorbs all writes while historical ones sit idle. Mitigations: shard by entity+time (not just time), pre-create partitions, use randomized prefixes to distribute recent writes, or use a purpose-fit time-series store (Timestream, InfluxDB) that manages this internally.",
            tip: "Key insight: recent data = hot data in most write-heavy systems. IoT, social feeds, financial ticks all suffer temporal hotspots. Timestream and similar stores solve this natively.",
            simple: "In systems that write data constantly (IoT sensors, social feeds), the current time period gets all the traffic. Use compound shard keys or a time-series database that handles this automatically." },
          { term: "MapReduce", d:3, p:'l',
            full: "Programming model for large-scale batch processing: Map phase (apply a function to each input chunk in parallel, emit key-value pairs) → Shuffle (group by key across all nodes) → Reduce (aggregate each key's values). Lineage is automatic — intermediate data on disk enables fault tolerance. Modern systems (Spark) do the same in memory, faster.",
            tip: "MapReduce is foundational but largely replaced by Spark. Knowing the pattern shows you understand how big-data systems work: embarrassingly parallel maps, then a coordinated reduce.",
            simple: "MapReduce splits a big job across many machines (Map), groups the results by key (Shuffle), then combines each group (Reduce). Spark does the same thing but in memory." },
          { term: "Data locality", d:2, p:'m',
            full: "Principle: move compute to data, not data to compute. Transferring large datasets over the network is slow and expensive. HDFS co-locates data and compute on the same nodes. Spark's executor model tries to run tasks on nodes that already hold the partition. S3-based lakes need to move data to compute (Glue, EMR) — this is the trade-off of decoupled storage/compute vs co-located.",
            tip: "The core question when designing a pipeline: 'How much data moves over the network?' If the answer is 'terabytes per job,' locality matters. Push-down predicates (Parquet + column pruning) minimize this even with decoupled storage.",
            simple: "Process data where it lives instead of copying it to a central machine. Moving terabytes over the network is slow — good systems run the processing right next to the data." },
          { term: "Hot partition / hot key", d:2, p:'h',
            full: "One key or partition gets disproportionate traffic, throttling that shard while others idle. Caused by skewed access (a celebrity user, a trending item). Fixes: write sharding (key suffixes), caching the hot key, or request coalescing.",
            tip: "Differentiate hot key (one item) from hot partition (one shard). Write sharding spreads a single hot key across multiple physical keys.",
            simple: "When one piece of data is way more popular than the rest, its server gets swamped. You split it up or cache it." }
        ]
      },
      {
        id: "p4-pipelines", title: "Pipelines & Streaming",
        concepts: [
          { term: "Batch vs streaming", d:1, p:'h',
            full: "Batch: process data in scheduled chunks (e.g. nightly ETL). High throughput, higher latency (delay = batch window). Streaming: process events as they arrive (Kafka, Kinesis, Flink). Low latency but more complex (ordering, windowing, late data, exactly-once). Micro-batch (Spark Streaming): a middle ground — small batch windows for near-real-time. Modern systems often run both: streaming for real-time dashboards, batch for accurate historical recalculation.",
            tip: "Key question: 'What is the tolerable latency?' Minutes → batch. Seconds/sub-second → streaming. Also: can you handle reprocessing? Batch replays easily; streaming needs a retained log (Kafka's retention window).",
            simple: "Batch = process once per hour/day in bulk (simple but delayed). Streaming = process each event as it arrives (complex but real-time). Most systems need both." },
          { term: "Delivery semantics", d:2, p:'h',
            full: "At-most-once: deliver without waiting for ack — fast, may lose messages. At-least-once: retry on failure — no loss, may duplicate. Exactly-once: hardest — idempotent producers + transactional consumers in Kafka; 2-phase commit otherwise. In practice, build at-least-once delivery with idempotent consumers (deduplicate on consumer side using a unique event ID) — it's simpler and scales better than distributed transactions.",
            tip: "Exactly-once is usually solved client-side: at-least-once delivery + idempotent consumers (store event IDs, skip duplicates). True distributed exactly-once requires transactions and is expensive.",
            simple: "At-most-once = fast but lossy. At-least-once = safe but may repeat. Exactly-once = hardest. Best practice: deliver at-least-once, and handle duplicates in the consumer code." },
          { term: "Windowing", d:2, p:'m',
            full: "How to aggregate streaming events over time. Tumbling window: fixed non-overlapping intervals ('sum every 5 min'). Sliding window: overlapping intervals ('last 5 min' updated every 1 min). Session window: dynamic, based on inactivity gap ('aggregate events for one user session'). Late data: events arrive after their window closes — use a watermark (maximum allowed latency for late events) and decide whether to update or drop late results.",
            tip: "Late data handling is the subtle exam point. 'What happens when a mobile event arrives 10 minutes late?' Watermark + allowed lateness = key design decision. Dropping late data is simpler but loses revenue events.",
            simple: "Windowing groups streaming events by time: fixed buckets, overlapping buckets, or per-session. The tricky part is late-arriving events — you have to decide when to stop waiting and emit the result." },
          { term: "Backpressure", d:2, p:'m',
            full: "When a pipeline stage produces data faster than the next stage can consume it, the buffer fills — backpressure is how you signal the upstream to slow down. Kafka consumer lag is a form of backpressure measurement. Reactive systems (Akka Streams, Flink) propagate backpressure signals upstream. Without backpressure, buffers overflow and events are dropped or the system OOMs.",
            tip: "Consumer lag in Kafka = visible backpressure. Growing lag = consumers can't keep up. Fix: add consumers (up to partition count), or reduce per-message processing time. Lag alerting is your backpressure alarm.",
            simple: "When a slow consumer can't keep up with a fast producer, the queue fills up and events get lost. Backpressure signals the producer to slow down so the pipeline stays healthy." },
          { term: "ETL vs ELT", d:1, p:'h',
            full: "ETL: transform before loading into the warehouse (classic, fixed schema). ELT: load raw then transform inside the warehouse/lake using its compute (modern, flexible, leverages cheap scalable storage + warehouse power).",
            tip: "ELT dominates with cloud warehouses (Snowflake/Redshift/BigQuery) because storage is cheap and compute is elastic.",
            simple: "ETL cleans data before storing it. ELT stores it raw then cleans it later using the warehouse's own power." },
          { term: "Kafka internals", d:3, p:'m',
            full: "Topics split into partitions (the unit of parallelism and ordering). Producers append; consumers in a consumer group each own partitions and track offsets. Delivery semantics: at-most-once, at-least-once, exactly-once (via idempotent producers + transactions). Backpressure handled by consumer lag.",
            tip: "Ordering is only guaranteed within a partition. Want global order? One partition (no parallelism). Choose the partition key to balance ordering vs throughput.",
            simple: "Kafka is a log split into lanes (partitions). Order is only kept within a lane. Consumers track how far they've read (offsets)." },
          { term: "CDC (Change Data Capture)", d:2, p:'m',
            full: "Streams row-level changes out of a database (usually by reading the transaction log) so downstream systems stay in sync without batch reloads. Powers replication, cache invalidation, and lake ingestion in near-real-time.",
            tip: "Log-based CDC (e.g. reading the WAL/binlog) is low-impact vs query-based polling, which adds load and misses deletes.",
            simple: "CDC watches a database's change log and streams every insert/update/delete out so other systems stay current instantly." }
        ]
      },
      {
        id: "p4-analytics", title: "Warehouse, Lake & Lakehouse",
        concepts: [
          { term: "Warehouse vs Lake vs Lakehouse", d:2, p:'h',
            full: "Warehouse: structured, schema-on-write, optimized SQL analytics (Redshift). Lake: raw files of any format, schema-on-read, cheap and flexible (S3). Lakehouse: lake storage + warehouse-like management (ACID, schema) via open table formats — best of both.",
            tip: "Lakehouse exists because lakes lacked transactions/schema enforcement. Open table formats (Iceberg, Delta, Hudi) add them.",
            simple: "Warehouse = tidy organized data for analytics. Lake = a big cheap pile of raw files. Lakehouse = a lake with warehouse-like order on top." },
          { term: "Open table formats: Iceberg, Delta, Hudi", d:3, p:'m',
            full: "Open table formats add warehouse features on top of object storage (S3): ACID transactions (concurrent reads/writes without corruption), time travel (query historical snapshots), schema evolution (add/drop columns safely), partition evolution. Apache Iceberg (AWS Glue/Athena native), Delta Lake (Databricks), Apache Hudi (AWS EMR native, optimized for record-level upserts). All three support Parquet columnar format under the hood.",
            tip: "Key differentiator: Hudi is optimized for record-level upserts (great for CDC ingestion). Iceberg for complex analytics with partition evolution. Delta for Databricks-native workflows.",
            simple: "Open table formats (Iceberg, Delta, Hudi) make a storage lake behave like a database: ACID transactions, rollbacks, and schema changes without breaking existing queries." },
          { term: "Separating storage from compute", d:2, p:'h',
            full: "Traditional data warehouses co-located storage and compute (scale both together). Cloud-native approach: store data in S3 (cheap, elastic, durable) and scale compute separately (Redshift RA3, Athena, Snowflake). Benefits: independent scaling, pay only for compute when running queries, multiple compute engines can read the same data. Trade-off: performance sensitive to network latency between storage and compute — mitigated by caching layers and columnar format push-down.",
            tip: "This is the core architecture of Redshift RA3, Snowflake, and Athena. The ability to query S3 with multiple tools (Athena for ad-hoc, Redshift for heavy BI) on the same data is the key benefit.",
            simple: "Store your data in S3 (cheap) and use separate powerful computers only when you need to query it. You only pay for compute when running queries, and multiple tools can read the same data." },
          { term: "Materialized views", d:2, p:'h',
            full: "Pre-computed, stored query results. Unlike regular views (recalculated on every query), materialized views are persisted and refreshed on a schedule or on-demand. They speed up complex, expensive aggregation queries by storing the result. Trade-off: stale between refreshes. Redshift supports incremental refresh (update only changed rows). Use for known slow queries called frequently (dashboards, pre-aggregated metrics).",
            tip: "Materialized views are the answer to 'how do you make slow aggregation queries fast without refactoring the data model?' Pre-compute the heavy join/aggregation and query the result.",
            simple: "A materialized view saves the result of a complex query so you don't recalculate it every time. It's stale until refreshed — a speed vs freshness trade-off." },
          { term: "Lambda vs Kappa architecture", d:3, p:'l',
            full: "Lambda: separate batch and speed layers, merged at query — accurate but two codebases to maintain. Kappa: a single streaming pipeline reprocessed from the log when needed — simpler, one codebase, favored when streaming can handle the load.",
            tip: "Kappa wins when your stream processor can also do reprocessing; Lambda persists where batch accuracy/throughput still matters.",
            simple: "Lambda runs batch and streaming side by side (two systems). Kappa uses one streaming system and just replays history when needed." }
        ]
      },
      {
        id: "p4-caching", title: "Caching",
        concepts: [
          { term: "Redis data structure internals", d:3, p:'m',
            full: "Redis isn't just a key-value store: Strings, Hashes (O(1) field access), Lists (head/tail push for queues), Sets (unique membership, intersections), Sorted Sets (ordered by score, ZADD/ZRANGE for leaderboards at O(log n)), HyperLogLog (cardinality estimation, O(1) space), Streams (append-only log, consumer groups for Kafka-like patterns). Choosing the right data structure is the difference between O(1) and O(n).",
            tip: "For leaderboards: Sorted Set (ZADD/ZRANK). For recent activity: List (LPUSH/LRANGE). For deduplication: Set (SADD/SISMEMBER). For session: Hash (HSET/HGET). Picking the right structure is the core Redis skill.",
            simple: "Redis has 7+ data types beyond simple strings. The right one for a leaderboard is sorted set (O(log n) ranking). The wrong one (list + sort) would be much slower." },
          { term: "Redis vs Memcached", d:2, p:'m',
            full: "Redis: rich data structures, persistence, replication, pub/sub, single-threaded core. Memcached: simple multithreaded key-value, pure cache, no persistence. Redis for almost everything beyond a plain cache.",
            tip: "Pick Memcached only for the simplest multithreaded caching at huge scale; otherwise Redis's features usually win.",
            simple: "Redis is a Swiss-army cache with data types and saving. Memcached is a plain, fast, throwaway cache." },
          { term: "Cache invalidation strategies", d:2, p:'h',
            full: "TTL-based (passive): key expires after N seconds — simple, always eventually consistent, but stale during the window. Event-driven (active invalidation): on write, explicitly delete/update the cache key — precise, but complex and must handle race conditions. Stale-while-revalidate: serve stale data while asynchronously refreshing — balances freshness and latency. Write-through: update cache and DB together — consistent but slower writes. The 'two hard things' are cache invalidation and naming: invalidation must be transactional or you get dirty reads.",
            tip: "Combine TTL (safety net) + event-driven invalidation (precision) + jitter (stampede prevention). No single strategy is sufficient alone.",
            simple: "Cache invalidation is knowing when to throw away stale data. TTL = auto-expire after N seconds. Event-driven = delete it immediately when the data changes. Usually you need both." },
          { term: "Cache patterns & invalidation", d:2, p:'h',
            full: "Cache-aside (lazy): app loads on miss and writes to cache — most common. Write-through: write to cache+DB together (consistent, slower writes). Write-back: write to cache, flush later (fast, risk of loss). Invalidation by TTL or event; the hard part is avoiding stale data and stampedes.",
            tip: "Cache invalidation is famously hard. Combine event-driven invalidation (precise) with TTL (safety net), plus jitter for stampede protection.",
            simple: "Cache-aside: load it when missing. Write-through: update cache and DB together. The tricky part is knowing when cached data is stale." }
        ]
      },
      {
        id: "p4-quality", title: "Data Quality & Governance",
        concepts: [
          { term: "Schema evolution", d:2, p:'h',
            full: "Changing a schema without breaking consumers. In Avro/Protobuf: backward compatibility (new schema can read old data) and forward compatibility (old schema can read new data). Rules: adding optional fields = backward compatible. Removing required fields or changing types = breaking. Schema Registry (Confluent, AWS Glue) enforces compatibility before a producer can publish a new schema. In Parquet/Iceberg: column add/drop at the metadata level without rewriting data files.",
            tip: "Always add new fields as optional (nullable), never rename or change types of existing fields. A schema registry that enforces compatibility contracts is the production solution.",
            simple: "Schema changes must not break existing code reading the old format. Add optional fields freely; never rename or change field types in production schemas." },
          { term: "Idempotency", d:2, p:'h',
            full: "An operation is idempotent if performing it multiple times has the same effect as once. Critical for at-least-once delivery: when you retry a failed write, you need to not double-count. Implementation: include a unique event ID in each message; consumer stores processed IDs in a deduplication table (DynamoDB, Redis) and skips re-processing. Exactly-once semantics = at-least-once delivery + idempotent consumers.",
            tip: "Idempotency is not built into most systems — you build it. 'We use a unique event UUID stored in DynamoDB; on receipt we check existence before processing.' This is the production answer.",
            simple: "Idempotent = safe to run twice (doing it again produces the same result). Critical for retries — you need to not double-charge a customer if a payment request is retried." },
          { term: "Data observability", d:2, p:'h',
            full: "The ability to understand the health and quality of your data throughout its lifecycle. The five pillars: freshness (is the data up to date?), distribution (are values in expected ranges?), volume (are row counts in expected range?), schema (has the structure changed unexpectedly?), lineage (where did this data come from?). Tools: Monte Carlo, dbt tests, AWS Glue Data Quality. Silent data quality failures are worse than pipeline crashes — the data looks fine but is wrong.",
            tip: "Silent corruption is the worst failure mode. 'The pipeline ran but a JOIN condition bug made all revenue figures wrong for 2 days' — data observability catches this before executives see bad numbers.",
            simple: "Data observability is monitoring for data quality (not just whether the pipeline ran). Is the data fresh? Are values in expected ranges? Did the schema change unexpectedly?" },
          { term: "Data lineage", d:3, p:'m',
            full: "Tracking data's origin, transformations, and consumption — the full provenance chain. Column-level lineage tracks which source columns feed which output columns through transforms. Critical for: debugging data quality issues ('where did this wrong value come from?'), impact analysis ('what breaks if I change this source table?'), compliance (GDPR right-to-erasure — which downstream tables have this user's data?). AWS Glue Data Catalog, Apache Atlas, OpenLineage are lineage tools.",
            tip: "GDPR compliance often requires column-level lineage to answer: 'All tables that contain user_id X.' Without lineage metadata, you're doing ad-hoc SQL archaeology to answer that question.",
            simple: "Data lineage is the family tree of your data — where it came from and what transformed it. Required for debugging ('where did this wrong number come from?') and compliance ('which tables have this user's data?')." }
        ]
      }
    ],
    interview: [
      { d:3, p:'m', q: "Design the data layer for a real-time gaming leaderboard with millions of players.", a: "Clarify first: how fresh must ranks be, how many players, read vs write ratio. A relational ACID store (Aurora) struggles with high-frequency rank updates at scale. Use Redis sorted sets (ZADD/ZRANGE) for O(log n) rank updates and reads — purpose-fit. Persist authoritative scores in a durable store (DynamoDB) via write-behind. Watch for hot keys (a global leaderboard is one hot key) — shard by region/segment and merge top-N. Diagnose → fix → trade-off (eventual consistency on exact global rank) → backstop (periodic reconciliation)." },
      { d:3, p:'m', q: "Ingestion pipeline is dropping events under load. How do you troubleshoot?", a: "Reason from the data pattern first: is loss correlated with traffic spikes (backpressure) or specific keys (hot partition)? Check consumer lag in Kafka — growing lag means consumers can't keep up. Confirm delivery semantics: at-least-once + idempotent consumers prevent loss without duplicates. Fix: scale consumer group / add partitions, ensure idempotency keys. Trade-off: more partitions weakens cross-partition ordering. Backstop: a dead-letter queue + lag alerting." },
      { d:3, p:'l', q: "When would you choose an LSM-based store over a B-Tree one?", a: "Write-heavy, high-ingest workloads — LSM buffers writes in memory and flushes sequentially, giving far better write throughput. Tie it to RUM: you accept read amplification and compaction overhead to win on update cost. If the workload is read-heavy point lookups with low write rate, a B-Tree store is the better fit." },
      { d:2, p:'h', q: "Design an analytics platform for a streaming IoT sensor feed.", a: "Temporal hotspot problem: timestamp-only partition key makes the current minute's shard absorb all writes. Fix: compound partition key (device_id + time bucket). For real-time: Kinesis → Flink/Kinesis Analytics → Timestream for time-series queries. For historical: Kinesis Firehose → S3 in Parquet → Athena/Redshift Spectrum for OLAP. Schema evolution: use Avro with Schema Registry. Data quality: monitor freshness and volume anomalies. Keep OLTP (device state) separate from OLAP (analytics)." },
      { d:2, p:'h', q: "Your data warehouse has a query that takes 45 minutes but is called 1,000 times per day. How do you fix it?", a: "Identify the pattern: same query, high frequency = materialized view candidate. Pre-compute the expensive aggregation and refresh on a schedule or on-write trigger. Second: check if it's doing a full table scan — add a covering index or switch to columnar partitioning by the filter dimension. Third: check if S3-based data lacks push-down predicates (Parquet + column pruning via Iceberg/Glue). Trade-off: materialized view is stale between refreshes — acceptable for a BI dashboard, not for a real-time dashboard." },
      { d:3, p:'m', q: "Data engineers report that a column in the analytics table has wrong values, but the pipeline shows no errors. Root cause?", a: "Silent data corruption — the worst failure mode. Approach: data lineage first ('what feeds this column?') then check each transformation step. Common causes: JOIN condition changed semantics silently, a source table schema changed and the pipeline didn't fail (it just filled with nulls or wrong types), a bug in a Spark transformation that affected some partitions. Prevention: data observability checks (volume, distribution, schema diffs), dbt tests, schema registry enforcement." }
    ],
    flashcards: [
      { d:3, p:'m', front: "PACELC: what does the 'ELC' part say?", back: "Else (no partition) → trade Latency vs Consistency." },
      { d:3, p:'l', front: "RUM conjecture?", back: "Optimize at most 2 of Read, Update, Memory overhead." },
      { d:3, p:'m', front: "B-Tree vs LSM-Tree strength?", back: "B-Tree = read latency; LSM = write throughput." },
      { d:2, p:'h', front: "Columnar storage is best for?", back: "Analytical scans over few columns (OLAP); great compression." },
      { d:3, p:'m', front: "What does consistent hashing minimize?", back: "Key remapping when nodes are added/removed." },
      { d:2, p:'h', front: "Fix for a single unavoidably hot key?", back: "Write sharding — add a suffix to spread across partitions." },
      { d:2, p:'m', front: "Kafka ordering guarantee?", back: "Only within a single partition." },
      { d:1, p:'h', front: "ETL vs ELT?", back: "ETL transforms before load; ELT loads raw then transforms in-warehouse." },
      { d:2, p:'h', front: "Lakehouse adds what to a lake?", back: "ACID + schema via open table formats (Iceberg/Delta/Hudi)." },
      { d:2, p:'m', front: "Redis structure for a leaderboard?", back: "Sorted set (ZADD/ZRANGE), O(log n) ranking." },
      { d:2, p:'h', front: "OLTP vs OLAP — what's the key difference?", back: "OLTP: short transactions on individual rows. OLAP: complex aggregations over millions of rows." },
      { d:1, p:'h', front: "Batch vs streaming trade-off?", back: "Batch = high throughput, high latency. Streaming = low latency, complex (ordering, late data, exactly-once)." },
      { d:2, p:'h', front: "Exactly-once delivery in practice?", back: "At-least-once delivery + idempotent consumers (deduplicate by event ID)." },
      { d:2, p:'h', front: "Temporal hotspot in sharding?", back: "Timestamp as shard key concentrates all writes on the current shard. Use compound key (entity + time bucket)." },
      { d:2, p:'h', front: "Materialized view vs regular view?", back: "Materialized = pre-computed and stored (fast, stale). Regular = recalculated on every query (fresh, slow)." },
      { d:2, p:'h', front: "Why is schema evolution breaking?", back: "Removing required fields or changing types breaks existing consumers. Adding optional fields is backward compatible." },
      { d:2, p:'h', front: "Idempotency in pipelines?", back: "Store processed event IDs; skip re-processing duplicates. Makes at-least-once delivery safe." },
      { d:3, p:'h', front: "Temporal hotspot common example?", back: "IoT/social feed writes — all new events hit the current time partition. Use compound shard keys or a time-series DB." }
    ]
  },

  {
    id: "p5", n: 5, name: "Security", color: "#C42348",
    blurb: "Access control, IAM evaluation, cryptography, network security, identity, governance.",
    sections: [
      {
        id: "p5-access", title: "Access Control",
        concepts: [
          { term: "Core mental models", d:1, p:'h',
            full: "Least privilege (minimum permissions, nothing more). Defense in depth (never trust one layer; identity → network → data → detection). Zero Trust (don't trust by network location; verify every request — identity, device, context). Separation of duties. Confused deputy (a privileged component tricked into acting for an attacker).",
            tip: "Defense in depth is the default answer shape for any security design question: layer the controls and explain what each contains if the one above fails.",
            simple: "Give the least access needed, never rely on a single wall, and don't trust someone just because they're 'inside the network' — check every request." },
          { term: "IAM policy evaluation logic", d:2, p:'h',
            full: "Five layers: identity-based, resource-based, permission boundaries, SCPs (org guardrails), session policies. Logic: an explicit Deny always wins; with no Deny you need an explicit Allow; the effective result is the intersection of all applicable layers.",
            tip: "Classic L5 question: 'user's policy allows X but they still can't do it — why?' Answer: an SCP or permission boundary is capping them, or there's an explicit deny.",
            simple: "Permissions stack in layers. A 'no' anywhere wins. You need a 'yes' somewhere, and every layer has to agree." },
          { term: "SCPs as organizational ceiling", d:2, p:'h',
            full: "Service Control Policies (SCPs) apply at the AWS Organization level to all accounts under an OU. They define the maximum permissions any principal in that account can have — not a grant, but a ceiling. An SCP that doesn't Allow an action means no IAM policy in the account can grant it. Common uses: prevent leaving the org, deny disabling CloudTrail, restrict to approved regions, block root account actions. SCPs don't affect the management account.",
            tip: "SCP is NOT a grant — it's a filter. An SCP that allows everything doesn't grant anything; IAM policies still need to explicitly allow. SCP blocks = look like implicit denies to the IAM evaluator.",
            simple: "SCPs set the maximum allowed actions for all accounts in an organization. Even if your IAM policy says 'allow,' an SCP saying 'not allowed' overrides it for the entire account." },
          { term: "Five policy layers in depth", d:3, p:'h',
            full: "Evaluation order: 1. Explicit Deny anywhere = DENY immediately. 2. SCP (org ceiling) — must allow or the action is denied even with IAM allows. 3. Resource-based policy — if principal is in the same account, acts as additional allow; cross-account: must allow the principal explicitly. 4. Permission boundary — caps the principal's maximum permissions (common for delegated IAM). 5. Session policy (assume-role with inline policy) — restricts the session further. Effective permissions = intersection of all. An allow in one layer doesn't help if another layer doesn't allow.",
            tip: "Draw the mental picture: five gates in series. An action must pass ALL gates. Most AccessDenied bugs come from a missed gate, especially SCPs and resource-based policies in cross-account scenarios.",
            simple: "Your permissions must pass five checkpoints in series: explicit deny check, SCP check, resource policy check, permission boundary check, session policy check. Every gate must say 'yes'." },
          { term: "Cross-account access & hidden KMS policy", d:3, p:'h',
            full: "Cross-account S3 access: Account B's bucket policy must grant Account A's principal. Plus: if encrypted with a CMK, Account B's KMS key policy must ALSO grant Account A decrypt — IAM alone is not sufficient for KMS across accounts. A common mistake: S3 access works, but decryption fails because the KMS key policy doesn't have a cross-account grant. Also need: Account A's IAM role must have permission to call S3 and KMS.",
            tip: "The hidden KMS catch: 'They have S3 access but get access denied on decrypt.' This is always a KMS key policy issue. Both the key policy (in Account B) and the IAM role (in Account A) must authorize the operation.",
            simple: "Cross-account S3 reads need two separate permissions: the bucket policy AND the KMS key policy both have to grant the other account access. Missing either one = access denied." },
          { term: "Roles, STS & confused deputy", d:2, p:'h',
            full: "Serious architectures avoid long-lived IAM user credentials; they use assumable roles via STS (temporary credentials) — instance profiles for compute, cross-account AssumeRole. Cross-account access uses sts:ExternalId to prevent the confused deputy problem.",
            tip: "iam:PassRole misconfiguration is a classic privilege-escalation path — call it out.",
            simple: "Don't hand out permanent passwords. Hand out temporary badges (roles) that expire, and use an ExternalId so a middleman can't be tricked into misusing access." }
        ]
      },
      {
        id: "p5-crypto", title: "Cryptography",
        concepts: [
          { term: "Envelope encryption", d:2, p:'h',
            full: "KMS doesn't encrypt your bulk data directly. It generates a data key; you encrypt locally with the data key; KMS only encrypts/decrypts the (small) data key. Efficient and scalable — you store the encrypted data key alongside the ciphertext.",
            tip: "This is a near-guaranteed question. Say it crisply: 'KMS encrypts the data key, not the data.'",
            simple: "Lock your data with a local key, then lock that key with KMS. KMS only ever handles the small key, not your big files." },
          { term: "At rest vs in transit & key types", d:1, p:'h',
            full: "At rest: KMS-managed encryption; distinguish AWS-managed keys, customer-managed keys (CMK — you control policy/rotation/audit), and AWS-owned keys. In transit: TLS. KMS key access requires permission in both the key policy and (usually) IAM. CloudHSM when you need a dedicated FIPS 140-2 Level 3 HSM.",
            tip: "CMK = control (rotation, key policy, CloudTrail audit). Use it when compliance demands you own the key lifecycle.",
            simple: "Encrypt stored data (at rest) and data on the wire (in transit). Customer-managed keys give you full control; CloudHSM is for the strictest requirements." },
          { term: "AEAD (Authenticated Encryption with Associated Data)", d:3, p:'m',
            full: "A mode of encryption that provides both confidentiality AND integrity/authenticity in one operation. The 'Associated Data' (unencrypted metadata) is authenticated alongside the ciphertext — if either the ciphertext or the metadata is tampered with, decryption fails. AES-GCM is the dominant AEAD cipher. TLS 1.3 mandates AEAD only. Prevents padding oracle attacks and ciphertext tampering that were possible with older modes (CBC without MAC).",
            tip: "If asked 'how does TLS protect against tampering, not just eavesdropping?' — AEAD. It combines encrypt-then-MAC in one efficient primitive, eliminating the ordering bugs that caused vulnerabilities in CBC+HMAC.",
            simple: "AEAD encrypts AND verifies the data in one step. If an attacker changes even one byte of the encrypted message, decryption fails and you know the message was tampered with." },
          { term: "Key management lifecycle", d:2, p:'h',
            full: "Keys have a lifecycle: generate → distribute → store → use → rotate → archive → destroy. Rotation: AWS-managed CMKs auto-rotate yearly; you can enable automatic rotation for CMKs. Rotation creates a new key version for future encrypts while keeping old versions to decrypt old data — all transparent to the app. Compliance may require: rotation frequency, split custody (no single person holds the whole key), key destruction with certificate, HSM storage for key material.",
            tip: "Automatic rotation in KMS rotates the key material but keeps the same key ID — apps don't need to change. If you delete a key, all data encrypted with it is permanently unrecoverable. Ask about this before deleting CMKs.",
            simple: "Keys must be rotated (changed periodically) and eventually destroyed. In AWS, enabling automatic CMK rotation handles this transparently — same key ID, fresh key material each year." },
          { term: "Tokenization vs encryption", d:2, p:'h',
            full: "Encryption: transforms data into ciphertext that can be reversed with the key. The ciphertext retains the length/structure of the original and can be decrypted. Tokenization: replaces sensitive data with a random, non-reversible token stored in a vault. To get the original value, you query the vault. No key = no mathematical relationship to reverse. Use case: PCI-DSS compliance — store a card token in your DB, the actual card number lives in the vault. Tokenization is generally preferred for PAN (Primary Account Numbers).",
            tip: "PCI-DSS question: 'How do you store credit card numbers?' — tokenization (token in your DB, vault maps token to PAN). Not encryption, because even encrypted PANs in your DB create a larger scope for cardholder data environment.",
            simple: "Encryption scrambles data that can be unscrambled with a key. Tokenization replaces it with a meaningless code — the real value lives in a vault, nothing in your database can be reversed." },
          { term: "TLS termination options", d:2, p:'h',
            full: "Where you terminate TLS determines the inspection/trust boundary. Edge termination (ALB/CloudFront): TLS terminates at the edge, traffic inside the VPC may be unencrypted or re-encrypted. End-to-end TLS: each hop re-encrypts (ELB → app → DB). mTLS (mutual TLS): both client and server authenticate each other with certificates — standard for zero-trust service meshes (Istio, App Mesh). TLS passthrough: LB doesn't inspect/terminate — forwards raw TCP to backend, lowest latency, no WAF/routing ability.",
            tip: "mTLS is the service mesh authentication primitive. 'How do you authenticate service-to-service without shared secrets?' — mutual TLS certificates, verified by a service mesh control plane (App Mesh/Istio).",
            simple: "TLS can be terminated at the edge (CDN/LB), re-encrypted at each hop, or even mutual (both sides prove identity). mTLS is the gold standard for zero-trust service-to-service auth." },
          { term: "TLS 1.3, PFS & 0-RTT", d:2, p:'m',
            full: "TLS 1.3 is 1-RTT, mandates Perfect Forward Secrecy (compromising the long-term key doesn't decrypt past sessions), uses AEAD, drops legacy ciphers. 0-RTT speeds reconnects but is replayable.",
            tip: "PFS is the term to know: each session uses ephemeral keys so a future key compromise can't retroactively decrypt captured traffic.",
            simple: "TLS 1.3 is faster and ensures that even if a key leaks later, old recorded traffic stays safe. The 0-RTT speed trick is replayable, so don't use it for writes." }
        ]
      },
      {
        id: "p5-network", title: "Network Security",
        concepts: [
          { term: "SG vs NACL vs micro-segmentation", d:2, p:'h',
            full: "Security Groups (stateful, instance-level) and NACLs (stateless, subnet-level) are the VPC building blocks. Micro-segmentation pushes isolation down to workload-to-workload rules so a breach in one service can't move laterally. VPC endpoints keep traffic on the AWS network (no internet exposure).",
            tip: "Lateral movement is the threat micro-segmentation addresses — assume breach and contain blast radius.",
            simple: "Wall off every service from every other one so a hacker who gets into one can't wander into the rest." },
          { term: "L3/L4 vs L7 protection & DDoS", d:2, p:'m',
            full: "L3/L4 attacks (volumetric floods, SYN floods) are mitigated by Shield/scrubbing. L7 attacks mimic legitimate traffic (HTTP floods) and need a WAF with rate-based rules, bot detection, and behavioral analysis. Distinguishing a botnet from a legitimate traffic surge is the hard part.",
            tip: "L7 DDoS looks like real users — you defend with WAF rate limits + bot signatures, not just volume thresholds.",
            simple: "Some attacks just flood you with junk (easy to filter); cleverer ones look like real users (need smarter filtering to tell them apart)." },
          { term: "WAF vs IPS vs RASP", d:3, p:'h',
            full: "WAF (Web Application Firewall): inspects HTTP traffic for known attack signatures (SQLi, XSS, OWASP Top 10), rate-based rules, geo-blocking — at the edge (CloudFront/ALB). IPS (Intrusion Prevention System): network-level, detects and blocks anomalous packet patterns — AWS Network Firewall for VPC. RASP (Runtime Application Self-Protection): runs inside the application process, intercepts function calls at runtime to detect attacks from inside — not available natively in AWS, requires agent libraries. Defense-in-depth: WAF at edge + IPS at network + RASP at runtime.",
            tip: "WAF = edge, knows HTTP. IPS = network, knows packets. RASP = inside the app, knows function calls. If asked 'what if an attacker bypasses the WAF?' — 'RASP would still detect the malicious SQL call at the application layer.'",
            simple: "WAF blocks bad HTTP requests at the edge. Network Firewall/IPS blocks bad network packets. RASP sits inside the app and blocks attacks even if they got past the others." }
        ]
      },
      {
        id: "p5-identity", title: "Identity & Federation",
        concepts: [
          { term: "MFA (Multi-Factor Authentication)", d:1, p:'h',
            full: "Adds a second authentication factor: something you have (TOTP app, hardware token) in addition to something you know (password). Reduces credential-stuffing blast radius because stolen passwords alone don't suffice. AWS best practices: require MFA for console login, and for sensitive API calls (aws:MultiFactorAuthPresent condition in IAM policies). Root account must have hardware MFA. Phishing-resistant MFA: hardware security keys (FIDO2/WebAuthn) are more secure than TOTP, which can be phished via real-time MITM.",
            tip: "Make MFA a condition in IAM policies for sensitive actions: 'Deny s3:DeleteBucket unless aws:MultiFactorAuthPresent = true.' TOTP apps are phishable; hardware FIDO2 keys are not.",
            simple: "MFA requires a second proof of identity beyond a password. Even if a password is stolen, the attacker can't log in without the second factor. Always enforce for sensitive actions." },
          { term: "SAML vs OIDC, JWT & PKCE", d:2, p:'m',
            full: "SAML: XML-based enterprise SSO. OIDC: modern, JSON/JWT-based, built on OAuth 2.0 — used for web/mobile. JWT carries signed claims for stateless auth. PKCE protects public clients (mobile/SPA) in the OAuth code flow from interception. MFA adds a second factor.",
            tip: "OIDC for new app/SSO; SAML for legacy enterprise IdPs. Always use PKCE for public OAuth clients.",
            simple: "SAML = older enterprise login. OIDC = modern login built on OAuth. PKCE is an extra lock so phone/web apps can't have their login codes stolen." },
          { term: "Identity-Aware Proxy / AWS Verified Access", d:2, p:'m',
            full: "A proxy that authenticates and authorizes every request before it reaches the application — no VPN needed. AWS Verified Access evaluates trust data (identity from AWS IAM Identity Center/OIDC, device posture from AWS Verified Access trust providers) per request. Replaces VPN-based access: instead of 'once authenticated to the network, access everything,' you get 'each app request is authorized with full context.' Useful for internal apps accessed by remote employees.",
            tip: "The framing: Identity-Aware Proxy = per-request authorization replacing VPN-based 'castle-and-moat' access. Zero Trust in practice for web-based internal apps.",
            simple: "An identity-aware proxy stands in front of internal apps and checks who you are and whether your device is healthy on every request — no VPN needed." },
          { term: "Continuous / contextual authorization", d:2, p:'m',
            full: "Beyond point-in-time authentication: evaluate authorization at every access based on dynamic context — user identity, device health, location, time of day, behavioral anomalies. If context changes (device becomes unhealthy, user logs in from an unusual country), access is revoked or stepped up. AWS IAM conditions (aws:SourceIp, aws:RequestedRegion, aws:CurrentTime, aws:MultiFactorAuthPresent) enable contextual IAM policies. NIST 800-207 defines the full Zero Trust Architecture model.",
            tip: "Contextual authorization is what separates real Zero Trust from 'just use SSO.' Show you can translate it to IAM: 'Deny sensitive actions unless source IP is in the corporate range AND MFA is present AND it's business hours.'",
            simple: "Contextual authorization checks not just who you are, but your current situation: device health, location, time. Access can be revoked mid-session if something changes." },
          { term: "Zero Trust design", d:2, p:'h',
            full: "No implicit trust by network location. Every request is authorized continuously based on identity, device posture, and context (Authentication + Verification + Authorization). The perimeter becomes identity, not the network edge.",
            tip: "Frame Zero Trust as 'authorize every request, every time' — not 'authenticate once at the edge.'",
            simple: "Check every single request, every time — being inside the office network doesn't earn automatic trust." }
        ]
      },
      {
        id: "p5-governance", title: "Governance & Detection",
        concepts: [
          { term: "Multi-account landing zone", d:2, p:'h',
            full: "Best practice for production AWS: separate accounts by environment and workload domain (Prod, Staging, Dev, Security/Logging, Shared Services). An AWS Control Tower landing zone creates this structure with guardrails (preventive SCPs + detective Config rules) automatically. Benefits: blast radius reduction (a compromised dev account can't reach prod), billing visibility, separate trust boundaries for different teams/compliance requirements. The security account holds immutable CloudTrail logs and GuardDuty findings aggregated from all accounts.",
            tip: "Multi-account is not optional at enterprise scale — it's the security architecture foundation. 'Why not just use multiple VPCs in one account?' Because IAM, resource quotas, and blast radius are account-scoped.",
            simple: "Large organizations use many AWS accounts to isolate workloads. A landing zone automates the setup with guardrails. If one account is breached, the damage can't spread to other accounts." },
          { term: "Preventive vs detective & blast radius", d:2, p:'h',
            full: "Preventive controls stop bad actions (SCPs, IAM, encryption); detective controls find them after the fact (GuardDuty, Macie, Inspector, CloudTrail). Blast radius = how much one compromised credential/account can reach. Landing zones and multi-account structure shrink it.",
            tip: "Good answers pair prevention with detection and explicitly minimize blast radius (account separation, least privilege).",
            simple: "Prevent bad actions where you can, detect the rest, and design so that if one account is breached, the damage stays small." },
          { term: "Compliance frameworks", d:2, p:'m',
            full: "SOC 2: audit of security/availability/confidentiality controls — common for SaaS vendors. PCI-DSS: payment card data security — strict requirements on cardholder data storage/transmission (tokenization, network segmentation, audit logging). HIPAA: US healthcare data — encryption at rest/in transit, access controls, audit trails, BAAs with AWS. GDPR: EU personal data — right to erasure, data minimization, breach notification. AWS Config conformance packs + Security Hub standards map controls to these frameworks.",
            tip: "When asked about compliance: identify which data category is in scope, which framework applies, and which AWS services satisfy each control. Don't memorize the frameworks — map them to services.",
            simple: "Different industries have different compliance requirements (PCI for payments, HIPAA for health, GDPR for EU users). AWS provides services and audit reports to satisfy each framework's controls." },
          { term: "KMS throttling & data key caching", d:3, p:'m',
            full: "KMS has request quotas (default 5,000-30,000 TPM by region and key). High-throughput applications that call KMS for every encrypt/decrypt operation will hit throttling. Data Key Caching: generate a data key from KMS once, cache it in memory for N seconds/M operations, use it for many encrypt operations without calling KMS each time. AWS Encryption SDK provides data key caching built-in. Trade-off: cached keys are a wider window of key exposure, but encrypted with KMS-derived material.",
            tip: "If designing a system that encrypts millions of events per second, explicitly address KMS throttling. 'We use data key caching — one KMS call per cache TTL, not per record. Trade-off: a compromised process has access to a few minutes of data keys.'",
            simple: "KMS has a rate limit. High-traffic apps that call KMS on every record will get throttled. Data key caching reuses the same key for N operations, dramatically reducing KMS calls." },
          { term: "Logging, detection & incident response", d:2, p:'m',
            full: "Immutable, centralized logging (CloudTrail to a locked account) so attackers can't erase tracks. GuardDuty (threat detection), Macie (sensitive-data discovery), Inspector (vulnerabilities). The IR cycle: detect → contain → eradicate → recover → learn.",
            tip: "Logs must be tamper-proof and in a separate account — an attacker who deletes the logs erases the investigation.",
            simple: "Keep unchangeable logs somewhere attackers can't reach, use tools to spot threats, and follow a clear plan when something goes wrong." }
        ]
      }
    ],
    interview: [
      { d:3, p:'h', q: "Design cross-account access so Account A can read an S3 bucket in Account B, encrypted with a customer-managed key.", a: "Layer it: in Account B, a resource-based bucket policy grants A's role access, and the KMS key policy must also grant A decrypt (KMS needs both key policy and IAM). In Account A, an IAM role with permission to AssumeRole / call S3+KMS. Use sts:ExternalId on the cross-account trust to prevent confused deputy. Least privilege the actions to the specific bucket/prefix. Backstop with CloudTrail in a locked logging account." },
      { d:2, p:'m', q: "Your site is under an L7 DDoS that looks like real user traffic. How do you respond?", a: "Distinguish botnet from legitimate surge first — that's the hard part. Layer defenses: WAF rate-based rules per IP/session, bot detection signatures, and behavioral analysis (request patterns, geography). Shield for the volumetric component. Trade-off: aggressive rules risk blocking real users, so start in count mode, tune, then enforce. Backstop: autoscaling to absorb, CloudFront to absorb at edge, and alerting on anomaly rates." },
      { d:2, p:'h', q: "A user's IAM policy clearly allows an action, but they get AccessDenied. Why?", a: "Walk the evaluation logic: an explicit Deny anywhere wins — check for one. Then check the capping layers: a Service Control Policy at the org level or a permission boundary on the principal may not grant the action, and the effective permission is the intersection of all layers. Also check resource-based policy and any session policy. The allow in the identity policy isn't sufficient if a higher guardrail doesn't permit it." },
      { d:2, p:'h', q: "How would you design the AWS account structure for a company with dev/staging/prod and a security team?", a: "Multi-account landing zone: management account (billing/org only), security account (immutable CloudTrail + GuardDuty aggregation), shared services account (VPC Transit Gateway, DNS), then prod/staging/dev accounts per workload. SCPs at the OU level enforce: deny leaving org, deny disabling CloudTrail, restrict to approved regions. Security account aggregates findings via Security Hub. Blast radius: a prod breach is contained to the prod account." },
      { d:2, p:'h', q: "You're encrypting millions of events per second. How do you avoid KMS throttling?", a: "Data key caching: generate one data key from KMS per cache TTL (e.g. 60 seconds), use it for all events in that window, then generate a fresh one. The AWS Encryption SDK provides this built-in. Trade-off: a compromised process has access to one cache window's worth of data keys. For compliance, set the TTL and max bytes per key to limits acceptable by your security policy. One KMS call per minute vs one per record." },
      { d:3, p:'h', q: "Compare WAF, IPS, and RASP. If an attacker bypasses your WAF, what stops them next?", a: "WAF (edge, HTTP inspection) catches known signatures and rate-based attacks before they hit servers. IPS/Network Firewall catches malicious packet patterns at the network layer inside the VPC. RASP runs inside the application process and can detect malicious calls (SQL injection reaching the DB connector) even if the payload evaded WAF. Defense in depth: WAF catches 90% of known attacks at the edge, IPS catches network-level anomalies, RASP is the last line at runtime." },
      { d:2, p:'m', q: "How do you implement Zero Trust for 500 remote employees accessing internal web apps, without a VPN?", a: "AWS Verified Access (or equivalent IAP): each request to an internal app is evaluated against identity (AWS IAM Identity Center / corporate IdP) + device posture (endpoint verification agent). No broad network access is granted. Each app has its own trust policy — finance app requires MFA + compliant device + corporate IP range. Vs VPN: VPN grants network access; Verified Access grants per-app, per-request access. Audit: every access attempt logged with full context." }
    ],
    flashcards: [
      { d:2, p:'h', front: "Envelope encryption in one line?", back: "KMS encrypts the data key, not the data; you encrypt data locally with the data key." },
      { d:1, p:'h', front: "IAM evaluation: what always wins?", back: "An explicit Deny." },
      { d:2, p:'h', front: "Effective IAM permission across layers?", back: "The intersection of all applicable layers." },
      { d:2, p:'h', front: "Prevent the confused deputy in cross-account access?", back: "sts:ExternalId." },
      { d:2, p:'m', front: "What does Perfect Forward Secrecy guarantee?", back: "A future key compromise can't decrypt past captured sessions." },
      { d:2, p:'m', front: "Classic privilege-escalation path?", back: "Misconfigured iam:PassRole." },
      { d:2, p:'m', front: "L7 DDoS defense vs L3/L4?", back: "L7 needs WAF rate rules + bot detection; L3/L4 needs volumetric scrubbing/Shield." },
      { d:2, p:'m', front: "PKCE protects what?", back: "Public OAuth clients (mobile/SPA) from auth-code interception." },
      { d:2, p:'h', front: "Zero Trust core idea?", back: "Authorize every request; trust no one by network location." },
      { d:2, p:'h', front: "Where should audit logs live?", back: "Immutable, in a separate locked account so attackers can't erase them." },
      { d:2, p:'h', front: "What is an SCP?", back: "A ceiling on permissions for all accounts in an AWS Organization — not a grant, a filter." },
      { d:1, p:'h', front: "MFA best practice for root account?", back: "Hardware security key (FIDO2) — more phishing-resistant than TOTP apps." },
      { d:2, p:'h', front: "Cross-account S3 + KMS access: what two policies must allow?", back: "Bucket policy in Account B AND KMS key policy in Account B — IAM in Account A is not sufficient alone." },
      { d:2, p:'h', front: "Tokenization vs encryption for credit cards?", back: "Tokenization: replace PAN with token in DB, real value in vault. Encryption: PAN still in your DB (wider scope). PCI-DSS prefers tokenization." },
      { d:3, p:'m', front: "KMS throttling fix for high-volume encryption?", back: "Data key caching: one KMS call per cache TTL, reuse the key for many encryptions." },
      { d:3, p:'h', front: "WAF vs IPS vs RASP?", back: "WAF = edge HTTP inspection. IPS = network packet inspection inside VPC. RASP = inside app process, last line of defense." },
      { d:2, p:'h', front: "Multi-account landing zone purpose?", back: "Blast radius isolation + separate trust boundaries per workload/compliance domain." },
      { d:2, p:'m', front: "mTLS verifies what?", back: "Both sides authenticate with certificates — standard for zero-trust service-to-service auth." }
